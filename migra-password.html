<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Migrazione Password - Astra</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #fff; font-family: 'Poppins', sans-serif; padding: 2rem; min-height: 100vh; }
    h1 { color: #ff6b00; margin-bottom: .5rem; font-size: 1.4rem; }
    p { color: rgba(255,255,255,.6); font-size: .8rem; margin-bottom: 2rem; }
    .card { background: #181818; border: 1px solid rgba(255,107,0,.2); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card h2 { font-size: .9rem; color: #ff6b00; margin-bottom: 1rem; letter-spacing: .1em; text-transform: uppercase; }
    .user-row { display: flex; align-items: center; gap: .8rem; margin-bottom: .7rem; flex-wrap: wrap; }
    .user-name { font-size: .8rem; font-weight: 600; width: 180px; color: #fff; }
    .user-input { background: #222; border: 1px solid rgba(255,255,255,.15); border-radius: 8px; padding: .4rem .8rem; color: #fff; font-size: .8rem; width: 200px; outline: none; }
    .user-input:focus { border-color: #ff6b00; }
    .status { font-size: .7rem; padding: .25rem .6rem; border-radius: 6px; }
    .status.pending { background: rgba(255,255,255,.05); color: rgba(255,255,255,.4); }
    .status.ok { background: rgba(104,211,145,.1); color: #68D391; border: 1px solid rgba(104,211,145,.3); }
    .status.err { background: rgba(252,129,129,.1); color: #FC8181; border: 1px solid rgba(252,129,129,.3); }
    .status.skip { background: rgba(255,154,60,.1); color: #ff9a3c; border: 1px solid rgba(255,154,60,.3); }
    .btn { background: #ff6b00; color: #000; border: none; border-radius: 10px; padding: .7rem 2rem; font-size: .85rem; font-weight: 700; cursor: pointer; letter-spacing: .1em; text-transform: uppercase; margin-top: 1rem; transition: background .2s; }
    .btn:hover { background: #ff9a3c; }
    .btn:disabled { background: rgba(255,255,255,.1); color: rgba(255,255,255,.3); cursor: not-allowed; }
    .log { background: #111; border: 1px solid rgba(255,255,255,.08); border-radius: 10px; padding: 1rem; margin-top: 1.5rem; font-size: .7rem; color: rgba(255,255,255,.5); height: 200px; overflow-y: auto; font-family: monospace; }
    .log .ok { color: #68D391; }
    .log .err { color: #FC8181; }
    .log .info { color: #ff9a3c; }
  </style>
</head>
<body>

<h1>🔐 Migrazione Password — Astra</h1>
<p>Inserisci le password attuali (in chiaro) per ogni utente. Lo script le hasha e aggiorna il database. Lascia vuoto per saltare un utente.</p>

<div class="card">
  <h2>⚙ Admin & PR — collezione "utenti"</h2>
  <div id="utenti-list"></div>
</div>

<div class="card">
  <h2>👤 Utenti — collezione "utentiAstra"</h2>
  <div id="utentiAstra-list"></div>
</div>

<button class="btn" id="btn-migra" onclick="startMigration()">🚀 Avvia Migrazione</button>

<div class="log" id="log">In attesa...<br></div>

<script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>
<script>
  // Firebase config
  if (!firebase.apps.length) {
    firebase.initializeApp({
      apiKey: "AIzaSyDCKDdde5PhjbZOWt2Tu-NR1esbV8LY5Jk",
      authDomain: "astra-events-338dd.firebaseapp.com",
      projectId: "astra-events-338dd",
      storageBucket: "astra-events-338dd.firebasestorage.app",
      messagingSenderId: "166914171655",
      appId: "1:166914171655:web:835d061dde01e5aab89ba2"
    });
  }
  const db = firebase.firestore();

  const AUTH_WORKER = "https://astra-auth.astraaevents.workers.dev";

  const UTENTI = [
    'alberto.romolo','ale','alecara','astra','emanuele.bonini',
    'francesco.sarchielli','jacopo.pel','jajo','melissa.pomponi',
    'mirco.santini','simone.ottobrini','sofiapizzonia','tommaso.bartoli'
  ];

  const UTENTI_ASTRA = [
    'horrid','prova1','rex','tiziano.fiorelli'
  ];

  function buildList(ids, containerId) {
    const container = document.getElementById(containerId);
    ids.forEach(id => {
      const row = document.createElement('div');
      row.className = 'user-row';
      row.innerHTML = `
        <span class="user-name">@${id}</span>
        <input class="user-input" type="password" id="pwd-${id}" placeholder="Password attuale (lascia vuoto per saltare)">
        <span class="status pending" id="status-${id}">In attesa</span>
      `;
      container.appendChild(row);
    });
  }

  buildList(UTENTI, 'utenti-list');
  buildList(UTENTI_ASTRA, 'utentiAstra-list');

  async function hashPassword(pwd) {
    const res = await fetch(AUTH_WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'hash', password: pwd })
    });
    const data = await res.json();
    return data.hash;
  }

  function log(msg, type = '') {
    const el = document.getElementById('log');
    el.innerHTML += `<span class="${type}">${msg}</span><br>`;
    el.scrollTop = el.scrollHeight;
  }

  function setStatus(id, type, text) {
    const el = document.getElementById('status-' + id);
    el.className = 'status ' + type;
    el.textContent = text;
  }

  async function migrateUser(id, collection) {
    const pwd = document.getElementById('pwd-' + id).value;
    if (!pwd) {
      setStatus(id, 'skip', 'Saltato');
      log(`⏭ ${id} — saltato`, 'info');
      return;
    }

    try {
      const hash = await hashPassword(pwd);
      await db.collection(collection).doc(id).update({ password: hash });
      setStatus(id, 'ok', '✓ Aggiornato');
      log(`✓ ${id} — password aggiornata`, 'ok');
    } catch(e) {
      setStatus(id, 'err', '✗ Errore');
      log(`✗ ${id} — errore: ${e.message}`, 'err');
    }
  }

  async function startMigration() {
    const btn = document.getElementById('btn-migra');
    btn.disabled = true;
    btn.textContent = '⏳ Migrazione in corso...';

    document.getElementById('log').innerHTML = '';
    log('🚀 Inizio migrazione...', 'info');

    for (const id of UTENTI) {
      await migrateUser(id, 'utenti');
    }
    for (const id of UTENTI_ASTRA) {
      await migrateUser(id, 'utentiAstra');
    }

    log('✅ Migrazione completata!', 'ok');
    btn.textContent = '✅ Completato';
  }
</script>
</body>
</html>
