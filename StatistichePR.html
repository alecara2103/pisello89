<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Astra Events — I migliori eventi liceali di Roma. Prevendite, tavoli e contest." />
<meta name="keywords" content="eventi liceali roma, feste liceo roma, astra events" />
  <link rel="icon" type="image/jpeg" href="logo.jpg" />
  <title>Statistiche PR — Astra Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF6B00; --orange2: #FF9A3C;
      --black: #0A0A0A; --s1: #111111; --s2: #181818; --s3: #222222;
      --border: rgba(255,107,0,.18); --border2: rgba(255,255,255,.07);
      --white: #FFFFFF; --muted: rgba(255,255,255,.4);
      --green: #68D391; --blue: #63B3ED; --red: #FC8181;
      --purple: #A78BFA; --yellow: #F6E05E;
    }
    body { background: var(--black); color: var(--white); font-family: 'Poppins', sans-serif; min-height: 100vh; }
    body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background: radial-gradient(ellipse at 20% 10%, rgba(255,107,0,.06) 0%, transparent 55%); }

    /* TOPBAR */
    .topbar { position:fixed; top:0; left:0; right:0; z-index:200; display:flex; align-items:center; justify-content:space-between; padding:.8rem 1.2rem; background:rgba(10,10,10,.9); backdrop-filter:blur(16px); border-bottom:1px solid var(--border2); }
    .topbar-links { display:flex; gap:.45rem; flex-wrap:wrap; }
    .topbar-links a { font-size:.55rem; font-weight:500; letter-spacing:.14em; text-transform:uppercase; text-decoration:none; color:var(--orange); background:rgba(255,107,0,.1); border:1px solid rgba(255,107,0,.25); padding:.28rem .7rem; border-radius:99px; transition:background .2s; white-space:nowrap; }
    .topbar-links a:hover { background:rgba(255,107,0,.2); }
    .btn-exit { font-family:'Poppins',sans-serif; font-size:.55rem; font-weight:500; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); background:none; border:1px solid var(--border2); border-radius:8px; padding:.28rem .7rem; cursor:pointer; }
    .btn-exit:hover { color:var(--white); }

    /* HERO */
    .hero { position:relative; z-index:1; text-align:center; padding:5.5rem 1.5rem 1.5rem; }
    .pill { display:inline-flex; align-items:center; gap:.45rem; font-size:.58rem; font-weight:500; letter-spacing:.28em; text-transform:uppercase; color:var(--orange); border:1px solid var(--border); padding:.28rem .9rem; border-radius:99px; margin-bottom:1rem; }
    .pill-dot { width:5px; height:5px; border-radius:50%; background:var(--orange); box-shadow:0 0 6px var(--orange); animation:blink 2s ease infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
    .hero h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.8rem,8vw,5.5rem); letter-spacing:.04em; line-height:.9; }
    .hero h1 em { font-style:normal; background:linear-gradient(120deg,var(--orange),var(--orange2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

    /* TABS */
    .tabs-wrap { position:relative; z-index:1; padding:.8rem clamp(1rem,4vw,2.5rem) 0; }
    .tabs { display:inline-flex; background:var(--s1); border:1px solid var(--border); border-radius:14px; padding:.3rem; gap:.3rem; }
    .tab { font-family:'Poppins',sans-serif; font-size:.7rem; font-weight:500; letter-spacing:.14em; text-transform:uppercase; background:none; border:none; color:var(--muted); padding:.55rem 1.4rem; border-radius:10px; cursor:pointer; transition:background .22s, color .22s; }
    .tab.active { background:var(--orange); color:#000; }
    .tab:not(.active):hover { background:rgba(255,107,0,.1); color:var(--orange); }

    /* PAGE */
    .page { position:relative; z-index:1; padding:1.5rem clamp(1rem,4vw,2.5rem) 5rem; max-width:1100px; margin:0 auto; }

    /* EVENT FOLDERS */
    .events-grid { display:flex; flex-direction:column; gap:1rem; }
    .event-folder { background:var(--s1); border:1px solid var(--border2); border-radius:18px; overflow:hidden; transition:border-color .25s; }
    .event-folder.open { border-color:rgba(255,107,0,.35); }
    .folder-header { display:flex; align-items:center; gap:1rem; padding:1.1rem 1.4rem; cursor:pointer; user-select:none; transition:background .2s; }
    .folder-header:hover { background:rgba(255,255,255,.02); }
    .folder-icon { font-size:1.3rem; flex-shrink:0; }
    .folder-info { flex:1; min-width:0; }
    .folder-name { font-size:1rem; font-weight:600; color:var(--white); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .folder-date { font-size:.62rem; letter-spacing:.16em; text-transform:uppercase; color:var(--orange); margin-top:.15rem; }
    .folder-arrow { font-size:.9rem; color:var(--muted); transition:transform .25s; flex-shrink:0; }
    .event-folder.open .folder-arrow { transform:rotate(90deg); }

    /* PR LIST */
    .pr-list { border-top:1px solid var(--border2); padding:.8rem 1rem; display:none; flex-direction:column; gap:.5rem; }
    .event-folder.open .pr-list { display:flex; }
    .pr-row { background:var(--s2); border:1px solid var(--border2); border-radius:12px; overflow:hidden; }
    .pr-header { display:flex; align-items:center; gap:.8rem; padding:.75rem 1rem; cursor:pointer; transition:background .2s; }
    .pr-header:hover { background:rgba(255,255,255,.03); }
    .pr-avatar { width:32px; height:32px; border-radius:50%; background:rgba(99,179,237,.1); border:1px solid rgba(99,179,237,.25); display:flex; align-items:center; justify-content:center; font-size:.85rem; flex-shrink:0; }
    .pr-name-el { flex:1; font-size:.88rem; font-weight:500; color:var(--white); }
    .pr-arrow { font-size:.8rem; color:var(--muted); transition:transform .25s; }
    .pr-row.open .pr-arrow { transform:rotate(90deg); }

    /* STATS PANEL */
    .stats-panel { display:none; border-top:1px solid var(--border2); padding:1.1rem 1.2rem; background:var(--s3); }
    .pr-row.open .stats-panel { display:block; }

    .stats-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(min(100%,180px),1fr)); gap:.75rem; margin-bottom:1rem; }
    .stat-card { background:var(--s2); border:1px solid var(--border2); border-radius:12px; padding:.9rem 1rem; }
    .stat-label { font-size:.55rem; font-weight:500; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:.3rem; }
    .stat-value { font-family:'Bebas Neue',sans-serif; font-size:1.9rem; letter-spacing:.04em; line-height:1; }
    .stat-sub { font-size:.6rem; color:var(--muted); margin-top:.2rem; }
    .c-orange { color:var(--orange); }
    .c-green  { color:var(--green); }
    .c-blue   { color:var(--blue); }
    .c-red    { color:var(--red); }
    .c-yellow { color:var(--yellow); }
    .c-purple { color:var(--purple); }

    .stats-section-title { font-size:.6rem; font-weight:600; letter-spacing:.22em; text-transform:uppercase; color:var(--orange); margin-bottom:.6rem; margin-top:.9rem; }
    .detail-row { font-size:.75rem; color:var(--muted); padding:.35rem 0; border-bottom:1px solid var(--border2); display:flex; justify-content:space-between; }
    .detail-row:last-child { border-bottom:none; }
    .detail-row strong { color:var(--white); }

    .empty-stats { font-size:.7rem; color:rgba(255,255,255,.2); letter-spacing:.15em; text-transform:uppercase; text-align:center; padding:1.5rem; }

    /* GLOBAL TAB */
    .global-list { display:flex; flex-direction:column; gap:1rem; }
    .global-card { background:var(--s1); border:1px solid var(--border2); border-radius:16px; padding:1.2rem 1.4rem; animation:rise .4s ease both; }
    @keyframes rise { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .global-pr-header { display:flex; align-items:center; gap:.8rem; margin-bottom:1rem; }
    .global-pr-avatar { width:38px; height:38px; border-radius:50%; background:rgba(99,179,237,.1); border:1.5px solid rgba(99,179,237,.28); display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
    .global-pr-name { font-size:1rem; font-weight:600; }
    .global-pr-owner { font-size:.6rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }

    /* NOTE */
    .note-section { margin-top:1rem; border-top:1px solid var(--border2); padding-top:.9rem; }
    .note-title { font-size:.6rem; font-weight:600; letter-spacing:.22em; text-transform:uppercase; color:var(--orange); margin-bottom:.6rem; }
    .note-display { background:var(--s2); border:1px solid var(--border2); border-radius:10px; padding:.75rem 1rem; font-size:.8rem; color:var(--white); line-height:1.6; min-height:2.5rem; margin-bottom:.7rem; white-space:pre-wrap; }
    .note-display.empty { color:rgba(255,255,255,.2); font-style:italic; }
    .note-textarea { width:100%; background:var(--s2); border:1px solid var(--border2); border-radius:10px; color:var(--white); font-family:'Poppins',sans-serif; font-size:.82rem; padding:.75rem 1rem; outline:none; resize:vertical; min-height:80px; transition:border-color .2s; display:none; }
    .note-textarea:focus { border-color:var(--orange); }
    .note-actions { display:flex; gap:.5rem; flex-wrap:wrap; }
    .btn-note { font-family:'Poppins',sans-serif; font-size:.62rem; font-weight:600; letter-spacing:.13em; text-transform:uppercase; border-radius:8px; padding:.4rem .9rem; cursor:pointer; border:1px solid; transition:background .2s; }
    .btn-note-edit { background:rgba(255,107,0,.1); border-color:rgba(255,107,0,.3); color:var(--orange); }
    .btn-note-edit:hover { background:rgba(255,107,0,.2); }
    .btn-note-save { background:var(--green); border-color:var(--green); color:#000; display:none; }
    .btn-note-save:hover { background:#48BB78; }
    .btn-note-cancel { background:rgba(255,255,255,.06); border-color:var(--border2); color:var(--muted); display:none; }
    .btn-note-cancel:hover { background:rgba(255,255,255,.1); }

    /* ── Totals banner ── */
    .event-totals { background: rgba(255,107,0,.06); border: 1px solid rgba(255,107,0,.25); border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: .8rem; }
    .event-totals-title { font-size:.58rem; font-weight:700; letter-spacing:.24em; text-transform:uppercase; color:var(--orange); margin-bottom:.7rem; display:flex; align-items:center; gap:.5rem; }
    .et-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:.55rem; }
    .et-card { background:rgba(255,255,255,.04); border:1px solid var(--border2); border-radius:10px; padding:.6rem .75rem; text-align:center; }
    .et-val { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:.04em; line-height:1; }
    .et-name { font-size:.5rem; font-weight:500; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-top:.18rem; }

    .empty-state { text-align:center; padding:4rem 1.5rem; font-size:.72rem; color:rgba(255,255,255,.18); letter-spacing:.2em; text-transform:uppercase; }

    footer { position:relative; z-index:1; text-align:center; padding:2rem; border-top:1px solid var(--border); font-size:.6rem; letter-spacing:.22em; text-transform:uppercase; color:rgba(255,255,255,.15); }
    footer b { color:var(--orange); opacity:.4; font-weight:400; margin:0 .5rem; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-links">
    <a href="index.html">← Home</a>
    <a href="PannelloAdmin.html">← Pannello</a>
  </div>
  <button class="btn-exit" onclick="logout()">Esci</button>
</div>

<section class="hero">
  <div class="pill"><span class="pill-dot"></span>Solo admin</div>
  <h1>STATISTICHE<br><em>PR</em></h1>
</section>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('evento')">📁 Per evento</button>
    <button class="tab" onclick="switchTab('globale')">🌐 Statistiche globali</button>
  </div>
</div>

<div class="page">
  <div id="tab-evento"  class="events-grid"></div>
  <div id="tab-globale" class="global-list"  style="display:none;"></div>
</div>

<footer>© 2026 Astra Events <b>✦</b> Statistiche PR <b>✦</b> Solo uso interno</footer>

<script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>
<script>
  /* ── Auth ── */
  if ((sessionStorage.getItem('astra_role') || localStorage.getItem('ls_astra_role')) !== 'admin' && sessionStorage.getItem('astra_admin') !== '1') {
    alert('Accesso negato.'); window.location.href = 'index.html';
  }
  function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

  /* ── Firebase ── */
  if (!firebase.apps.length) {
    firebase.initializeApp({
      apiKey:            "AIzaSyDCKDdde5PhjbZOWt2Tu-NR1esbV8LY5Jk",
      authDomain:        "astra-events-338dd.firebaseapp.com",
      projectId:         "astra-events-338dd",
      storageBucket:     "astra-events-338dd.firebasestorage.app",
      messagingSenderId: "166914171655",
      appId:             "1:166914171655:web:835d061dde01e5aab89ba2"
    });
  }
  const db = firebase.firestore();

  /* ── State ── */
  let currentTab = 'evento';
  let events = [];
  let prs    = [];

  const adminNome    = (sessionStorage.getItem('astra_nome') || localStorage.getItem('ls_astra_nome') || '').trim();
  const isSuperAdmin = adminNome === '' || adminNome.toLowerCase() === 'admin astra' ||
                       ((sessionStorage.getItem('astra_admin') === '1' || localStorage.getItem('ls_astra_admin') === '1') &&
                        adminNome.toLowerCase() !== 'ale' &&
                        adminNome.toLowerCase() !== 'jajo');

  /* ── Tabs ── */
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-evento').style.display  = tab === 'evento'  ? 'flex' : 'none';
    document.getElementById('tab-globale').style.display = tab === 'globale' ? 'flex' : 'none';
    document.querySelectorAll('.tab').forEach((t,i) =>
      t.classList.toggle('active', (tab==='evento'&&i===0)||(tab==='globale'&&i===1))
    );
    if (tab === 'globale') renderGlobal();
  }

  /* ── Helpers ── */
  function fmtDate(s) {
    if (!s) return '';
    return new Date(s + 'T00:00:00').toLocaleDateString('it-IT', { day:'numeric', month:'long', year:'numeric' });
  }

  /* ══════════════════════════════════════════════
     COMPUTE STATS for a PR in an event
  ══════════════════════════════════════════════ */
  async function computeStats(evId, prId) {
    const [bDoc, sDoc, rDoc] = await Promise.all([
      db.collection('consegne').doc(evId).collection('biglietti').doc(prId).get(),
      db.collection('consegne').doc(evId).collection('scarico').doc(prId).get(),
      db.collection('consegne').doc(evId).collection('reso').doc(prId).get()
    ]);

    // ── Biglietti consegnati ──
    const bEntries = bDoc.exists ? (bDoc.data().entries || []) : [];
    let prevConsegnateU = 0, prevConsegnateD = 0, prevConsegnateTot = 0;
    bEntries.forEach(e => {
      if (e.genere) {
        prevConsegnateU += e.quantitaUomo || 0;
        prevConsegnateD += e.quantitaDonna || 0;
      } else {
        prevConsegnateTot += e.quantita || 0;
      }
    });
    const totalConsegnate = prevConsegnateU + prevConsegnateD + prevConsegnateTot;

    // ── Resi ──
    const rEntries = rDoc.exists ? (rDoc.data().entries || []) : [];
    const totalResi = rEntries.reduce((s, e) => s + (e.quantita || 0), 0);

    // ── Nette (consegnate - rese) ──
    const prevNette = totalConsegnate - totalResi;

    // ── Scarico ──
    const sEntries = sDoc.exists ? (sDoc.data().entries || []) : [];
    let prevScaricateU = 0, prevScaricateD = 0, prevScaricateTot = 0;
    let persone = 0, incasso = 0;
    sEntries.forEach(e => {
      if (e.genere) {
        prevScaricateU += e.prevUomo  || 0;
        prevScaricateD += e.prevDonna || 0;
      } else {
        prevScaricateTot += e.prevTot || 0;
      }
      if (e.hasTavolo) persone += e.persone || 0;
      if (e.totaleEuro != null) incasso += e.totaleEuro || 0;
    });
    const totalScaricate = prevScaricateU + prevScaricateD + prevScaricateTot;

    return {
      bEntries, sEntries, rEntries,
      prevConsegnateU, prevConsegnateD, prevConsegnateTot, totalConsegnate,
      totalResi, prevNette,
      prevScaricateU, prevScaricateD, prevScaricateTot, totalScaricate,
      persone, incasso
    };
  }

  /* ══════════════════════════════════════════════
     TAB 1 — PER EVENTO
  ══════════════════════════════════════════════ */
  function renderEvento() {
    const container = document.getElementById('tab-evento');
    container.innerHTML = '';
    if (!events.length) { container.innerHTML = '<div class="empty-state">Nessun evento trovato</div>'; return; }

    events.forEach(ev => {
      const folder = document.createElement('div');
      folder.className = 'event-folder';

      const header = document.createElement('div');
      header.className = 'folder-header';
      header.innerHTML = `
        <div class="folder-icon">📁</div>
        <div class="folder-info">
          <div class="folder-name">${ev.name}</div>
          <div class="folder-date">${fmtDate(ev.date)}</div>
        </div>
        <div class="folder-arrow">›</div>`;

      const prList = document.createElement('div');
      prList.className = 'pr-list';

      let loaded = false;
      header.addEventListener('click', () => {
        folder.classList.toggle('open');
        if (folder.classList.contains('open') && !loaded) {
          loaded = true;
          loadPRStats(ev, prList);
        }
      });

      folder.appendChild(header);
      folder.appendChild(prList);
      container.appendChild(folder);
    });
  }

  function loadPRStats(ev, prList) {
    prList.innerHTML = '<div style="padding:.5rem;font-size:.7rem;color:var(--muted);">Caricamento…</div>';
    if (!prs.length) { prList.innerHTML = '<div style="padding:.5rem;font-size:.7rem;color:var(--muted);">Nessun PR</div>'; return; }
    prList.innerHTML = '';

    // ── Totals banner ──
    const totalsDiv = document.createElement('div');
    totalsDiv.className = 'event-totals';
    totalsDiv.id = 'totals-' + ev.id;
    totalsDiv.innerHTML = `
      <div class="event-totals-title">
        📊 Totale evento — tutti i PR
        <button onclick="computeEventTotals('${ev.id}')" style="margin-left:auto;font-family:'Poppins',sans-serif;font-size:.58rem;font-weight:600;letter-spacing:.13em;text-transform:uppercase;background:rgba(255,107,0,.15);border:1px solid rgba(255,107,0,.35);color:var(--orange);border-radius:8px;padding:.28rem .75rem;cursor:pointer;">
          Calcola ↻
        </button>
      </div>
      <div class="et-grid" id="et-grid-${ev.id}">
        <div style="grid-column:1/-1;font-size:.68rem;color:rgba(255,255,255,.2);text-align:center;padding:.5rem;">Clicca "Calcola" per vedere i totali</div>
      </div>`;
    prList.appendChild(totalsDiv);

    prs.forEach(pr => {
      const row = document.createElement('div');
      row.className = 'pr-row';

      const hdr = document.createElement('div');
      hdr.className = 'pr-header';
      hdr.innerHTML = `<div class="pr-avatar">🎫</div><div class="pr-name-el">${pr.nome}</div><div class="pr-arrow">›</div>`;

      const panel = document.createElement('div');
      panel.className = 'stats-panel';

      let loaded = false;
      hdr.addEventListener('click', () => {
        row.classList.toggle('open');
        if (row.classList.contains('open') && !loaded) {
          loaded = true;
          panel.innerHTML = '<div style="font-size:.7rem;color:var(--muted);padding:.4rem 0;">Calcolo statistiche…</div>';
          computeStats(ev.id, pr.id).then(s => renderStatsPanel(panel, s, ev.id, pr.id, pr.level || 1));
        }
      });

      row.appendChild(hdr);
      row.appendChild(panel);
      prList.appendChild(row);
    });
  }

  async function computeEventTotals(evId) {
    const grid = document.getElementById('et-grid-' + evId);
    if (!grid) return;
    grid.innerHTML = '<div style="grid-column:1/-1;font-size:.68rem;color:var(--muted);text-align:center;padding:.5rem;">Calcolo in corso…</div>';

    let totCons=0, totResi=0, totNette=0, totScar=0, totPersone=0, totIncasso=0;
    let totConsU=0, totConsD=0, totScarU=0, totScarD=0;

    let totPagamento = 0;
    await Promise.all(prs.map(async pr => {
      const s = await computeStats(evId, pr.id);
      totCons    += s.totalConsegnate;
      totResi    += s.totalResi;
      totNette   += s.prevNette;
      totScar    += s.totalScaricate;
      totPersone += s.persone;
      totIncasso += s.incasso;
      totConsU   += s.prevConsegnateU;
      totConsD   += s.prevConsegnateD;
      totScarU   += s.prevScaricateU;
      totScarD   += s.prevScaricateD;
      if (s.incasso > 0) totPagamento += calcolaPagamento(s.incasso, pr.level || 1).importo;
    }));

    grid.innerHTML = `
      <div class="et-card"><div class="et-val c-orange">${totCons}</div><div class="et-name">Consegnati</div>${totConsU||totConsD?`<div style="font-size:.5rem;color:var(--muted)">${totConsU}U/${totConsD}D</div>`:''}</div>
      <div class="et-card"><div class="et-val c-red">${totResi}</div><div class="et-name">Resi</div></div>
      <div class="et-card"><div class="et-val c-green">${totNette}</div><div class="et-name">Netti</div></div>
      <div class="et-card"><div class="et-val c-blue">${totScar}</div><div class="et-name">Scaricati</div>${totScarU||totScarD?`<div style="font-size:.5rem;color:var(--muted)">${totScarU}U/${totScarD}D</div>`:''}</div>
      ${totPersone ? `<div class="et-card"><div class="et-val c-purple">${totPersone}</div><div class="et-name">Persone tav.</div></div>` : ''}
      ${totIncasso ? `<div class="et-card"><div class="et-val c-yellow">€${totIncasso}</div><div class="et-name">Incasso</div></div>` : ''}
      ${totPagamento > 0 ? `<div class="et-card" style="border-color:rgba(104,211,145,.35)"><div class="et-val c-green">€${totPagamento.toFixed(2)}</div><div class="et-name">💰 Pagamento tot.</div></div>` : ''}
    `;
  }

  function renderStatsPanel(panel, s, evId, prId, livello) {
    const hasData = s.bEntries.length || s.sEntries.length || s.rEntries.length;
    if (!hasData) { panel.innerHTML = '<div class="empty-stats">Nessun dato per questo PR in questo evento</div>'; return; }

    panel.innerHTML = `
      <!-- KPI cards -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Biglietti consegnati</div>
          <div class="stat-value c-orange">${s.totalConsegnate}</div>
          ${s.prevConsegnateU || s.prevConsegnateD ? `<div class="stat-sub">${s.prevConsegnateU} U / ${s.prevConsegnateD} D</div>` : ''}
        </div>
        <div class="stat-card">
          <div class="stat-label">Resi</div>
          <div class="stat-value c-red">${s.totalResi}</div>
          <div class="stat-sub">da sottrarre</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Biglietti netti</div>
          <div class="stat-value c-green">${s.prevNette}</div>
          <div class="stat-sub">consegnati − resi</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Biglietti scaricati</div>
          <div class="stat-value c-blue">${s.totalScaricate}</div>
          ${s.prevScaricateU || s.prevScaricateD ? `<div class="stat-sub">${s.prevScaricateU} U / ${s.prevScaricateD} D</div>` : ''}
        </div>


        ${s.persone ? `<div class="stat-card"><div class="stat-label">Persone tavoli</div><div class="stat-value c-purple">${s.persone}</div></div>` : ''}
        ${s.incasso ? `<div class="stat-card"><div class="stat-label">Incasso totale</div><div class="stat-value c-yellow">€${s.incasso}</div></div>` : ''}
        ${s.incasso ? (() => { const p = calcolaPagamento(s.incasso, livello); return `<div class="stat-card" style="border-color:rgba(104,211,145,.3);"><div class="stat-label">💰 Pagamento PR</div><div class="stat-value c-green">€${p.importo}</div><div class="stat-sub">${p.pct}% su €${s.incasso}</div></div>`; })() : ''}
        ${s.totalScaricate > 0 ? `<div class="stat-card" style="border-color:rgba(167,139,250,.25);"><div class="stat-label">🎁 Omaggi</div><div class="stat-value c-purple">${calcolaOmaggi(s.totalScaricate, livello)}</div><div class="stat-sub">${s.totalScaricate} scar ÷ 15</div></div>` : ''}
      </div>

      <!-- Dettaglio consegne -->
      ${s.bEntries.length ? `
        <div class="stats-section-title">🎟 Dettaglio consegne</div>
        ${s.bEntries.map((e,i) => `
          <div class="detail-row">
            <span><strong>Consegna ${i+1}</strong> &nbsp;·&nbsp; ${e.genere ? `${e.quantitaUomo||0} U / ${e.quantitaDonna||0} D` : `${e.quantita} prev`} &nbsp;·&nbsp; mat: ${e.matricola}</span>
          </div>`).join('')}
      ` : ''}

      <!-- Dettaglio scarico -->
      ${s.sEntries.length ? `
        <div class="stats-section-title">📊 Dettaglio scarico</div>
        ${s.sEntries.map((e,i) => `
          <div class="detail-row">
            <span><strong>Scarico ${i+1}</strong> &nbsp;·&nbsp; ${e.genere ? `${e.prevUomo||0} U / ${e.prevDonna||0} D` : `${e.prevTot||0} prev`}${e.hasTavolo ? ` &nbsp;·&nbsp; 🍾 ${e.persone} pers × €${e.quota}` : ''}${e.totaleEuro != null ? ` &nbsp;·&nbsp; 💶 €${e.totaleEuro}` : ''}</span>
          </div>`).join('')}
      ` : ''}

      <!-- Dettaglio resi -->
      ${s.rEntries.length ? `
        <div class="stats-section-title">↩ Dettaglio resi</div>
        ${s.rEntries.map((e,i) => `
          <div class="detail-row">
            <span><strong>Reso ${i+1}</strong> &nbsp;·&nbsp; <span style="color:var(--red)">${e.quantita} prev</span>${e.note ? ` &nbsp;·&nbsp; ${e.note}` : ''}</span>
          </div>`).join('')}
      ` : ''}
    `;

    // Add note section
    const noteKey = evId + '-' + prId;
    const noteDiv = document.createElement('div');
    noteDiv.className = 'note-section';
    noteDiv.id = 'note-section-' + noteKey;
    noteDiv.innerHTML = `
      <div class="note-title">📝 Note admin</div>
      <div class="note-display empty" id="note-display-${noteKey}">Nessuna nota</div>
      <textarea class="note-textarea" id="note-textarea-${noteKey}" placeholder="Scrivi una nota su questo PR per questo evento…"></textarea>
      <div class="note-actions">
        <button class="btn-note btn-note-edit" id="btn-edit-${noteKey}">✏️ Modifica nota</button>
        <button class="btn-note btn-note-save" id="btn-save-${noteKey}">✓ Salva</button>
        <button class="btn-note btn-note-cancel" id="btn-cancel-${noteKey}">✕ Annulla</button>
      </div>`;
    panel.appendChild(noteDiv);

    // Bind buttons
    noteDiv.querySelector('#btn-edit-' + noteKey).addEventListener('click', () => editNote(noteKey, evId, prId));
    noteDiv.querySelector('#btn-save-' + noteKey).addEventListener('click', () => saveNote(noteKey, evId, prId));
    noteDiv.querySelector('#btn-cancel-' + noteKey).addEventListener('click', () => cancelNote(noteKey));

    // Load existing note
    loadNote(noteKey, evId, prId);
  }

  /* ── Note ── */
  function loadNote(key, evId, prId) {
    db.collection('consegne').doc(evId).collection('note').doc(prId).get().then(d => {
      const display  = document.getElementById('note-display-' + key);
      const textarea = document.getElementById('note-textarea-' + key);
      if (!display) return;
      const text = d.exists ? (d.data().testo || '') : '';
      display.textContent = text || 'Nessuna nota';
      display.classList.toggle('empty', !text);
      if (textarea) textarea.value = text;
    });
  }

  function editNote(key) {
    document.getElementById('note-display-' + key).style.display   = 'none';
    document.getElementById('note-textarea-' + key).style.display  = 'block';
    document.getElementById('btn-edit-' + key).style.display       = 'none';
    document.getElementById('btn-save-' + key).style.display       = 'inline-flex';
    document.getElementById('btn-cancel-' + key).style.display     = 'inline-flex';
    document.getElementById('note-textarea-' + key).focus();
  }

  async function saveNote(key, evId, prId) {
    const testo = (document.getElementById('note-textarea-' + key).value || '').trim();
    await db.collection('consegne').doc(evId).collection('note').doc(prId).set({ testo, updatedAt: Date.now() });
    cancelNote(key);
    loadNote(key, evId, prId);
  }

  function cancelNote(key) {
    document.getElementById('note-display-' + key).style.display   = 'block';
    document.getElementById('note-textarea-' + key).style.display  = 'none';
    document.getElementById('btn-edit-' + key).style.display       = 'inline-flex';
    document.getElementById('btn-save-' + key).style.display       = 'none';
    document.getElementById('btn-cancel-' + key).style.display     = 'none';
  }

  /* ══════════════════════════════════════════════
     TAB 2 — STATISTICHE GLOBALI
  ══════════════════════════════════════════════ */
  async function renderGlobal() {
    const container = document.getElementById('tab-globale');
    container.innerHTML = '<div class="empty-state">Calcolo in corso…</div>';

    if (!prs.length) { container.innerHTML = '<div class="empty-state">Nessun PR trovato</div>'; return; }

    container.innerHTML = '';

    for (let i = 0; i < prs.length; i++) {
      const pr = prs[i];
      let totConsegnate = 0, totResi = 0, totScaricate = 0, totPersone = 0, totIncasso = 0;
      let totU_cons = 0, totD_cons = 0, totU_scar = 0, totD_scar = 0;

      // Sum across all events
      for (const ev of events) {
        const s = await computeStats(ev.id, pr.id);
        totConsegnate += s.totalConsegnate;
        totResi       += s.totalResi;
        totScaricate  += s.totalScaricate;
        totPersone    += s.persone;
        totIncasso    += s.incasso;
        totU_cons     += s.prevConsegnateU;
        totD_cons     += s.prevConsegnateD;
        totU_scar     += s.prevScaricateU;
        totD_scar     += s.prevScaricateD;
      }
      const pagTot = calcolaPagamento(totIncasso, pr.level || 1);
      const omaggiTot = calcolaOmaggi(totScaricate);

      const nette = totConsegnate - totResi;
      const prData = prs.find(p => p.id === pr.id) || {};

      const card = document.createElement('div');
      card.className = 'global-card';
      card.style.animationDelay = i * 0.05 + 's';
      card.innerHTML = `
        <div class="global-pr-header">
          <div class="global-pr-avatar">🎫</div>
          <div>
            <div class="global-pr-name">${pr.nome}</div>
            <div class="global-pr-owner">${pr.owner ? (pr.owner === 'Ale' ? '🟠 PR di Ale' : '🔵 PR di Jajo') : ''}</div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Biglietti consegnati</div>
            <div class="stat-value c-orange">${totConsegnate}</div>
            ${totU_cons || totD_cons ? `<div class="stat-sub">${totU_cons} U / ${totD_cons} D</div>` : ''}
          </div>
          <div class="stat-card">
            <div class="stat-label">Resi totali</div>
            <div class="stat-value c-red">${totResi}</div>
            <div class="stat-sub">sottratti</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Biglietti netti</div>
            <div class="stat-value c-green">${nette}</div>
            <div class="stat-sub">consegnati − resi</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Biglietti scaricati</div>
            <div class="stat-value c-blue">${totScaricate}</div>
            ${totU_scar || totD_scar ? `<div class="stat-sub">${totU_scar} U / ${totD_scar} D</div>` : ''}
          </div>

          ${totPersone ? `<div class="stat-card"><div class="stat-label">Persone tavoli</div><div class="stat-value c-purple">${totPersone}</div></div>` : ''}
          ${totIncasso ? `<div class="stat-card"><div class="stat-label">Incasso totale</div><div class="stat-value c-yellow">€${totIncasso}</div></div>` : ''}
          ${totIncasso ? `<div class="stat-card" style="border-color:rgba(104,211,145,.3);"><div class="stat-label">💰 Pagamento PR</div><div class="stat-value c-green">€${pagTot.importo}</div><div class="stat-sub">${pagTot.pct}% · Lv${pr.level||1}</div></div>` : ''}
          ${totScaricate > 0 && (pr.level||0) > 0 ? `<div class="stat-card" style="border-color:rgba(167,139,250,.25);"><div class="stat-label">🎁 Omaggi totali</div><div class="stat-value c-purple">${omaggiTot}</div><div class="stat-sub">${totScaricate} scar ÷ 15</div></div>` : ''}
        </div>`;
      container.appendChild(card);
    }

    // Banner totale pagamenti
    if (prs.length > 0) {
      let grandTotPag = 0, grandTotInc = 0;
      for (const pr of prs) {
        for (const ev of events) {
          const s = await computeStats(ev.id, pr.id);
          grandTotInc += s.incasso;
          if (s.incasso > 0) grandTotPag += calcolaPagamento(s.incasso, pr.level || 1).importo;
        }
      }
      if (grandTotPag > 0) {
        const totalBanner = document.createElement('div');
        totalBanner.style.cssText = 'background:rgba(104,211,145,.06);border:1px solid rgba(104,211,145,.3);border-radius:16px;padding:1.2rem 1.4rem;margin-top:.5rem;text-align:center;';
        totalBanner.innerHTML = `
          <div style="font-size:.58rem;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:#68D391;margin-bottom:.5rem;">💰 Totale pagamenti a tutti i PR</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:#68D391;letter-spacing:.06em;">€${grandTotPag.toFixed(2)}</div>
          <div style="font-size:.6rem;color:rgba(255,255,255,.3);margin-top:.3rem;">su €${grandTotInc} di incasso totale</div>`;
        container.appendChild(totalBanner);
      }
    }
  }


  /* ── Calcolo pagamento PR ── */
  function calcolaPagamento(incasso, livello) {
    if (!incasso || incasso <= 0) return { importo: 0, pct: 0 };
    if (livello === 0 || livello === '0') return { importo: 0, pct: 0 };
    const scalette = {
      1: [[300, 10], [600, 12.5], [1200, 15], [2400, 17.5], [3800, 20], [Infinity, 22.5]],
      2: [[300, 12.5], [600, 15], [1200, 17.5], [2400, 20], [3800, 22.5], [Infinity, 25]],
      3: [[300, 15], [600, 17.5], [1200, 20], [2400, 22.5], [3800, 25], [Infinity, 27.5]]
    };
    const lv = scalette[livello] || scalette[1];
    let pct = lv[lv.length - 1][1];
    for (const [soglia, p] of lv) {
      if (incasso <= soglia) { pct = p; break; }
    }
    return { importo: +((incasso * pct / 100).toFixed(2)), pct };
  }

  function calcolaOmaggi(prevScaricate, livello) {
    if (livello === 0 || livello === '0') return 0;
    if (!prevScaricate || prevScaricate <= 0) return 0;
    const raw = prevScaricate / 15;
    const decimale = raw - Math.floor(raw);
    return decimale > 0.7 ? Math.ceil(raw) : Math.floor(raw);
  }

  /* ══════════════════════════════════════════════
     INIT — load events + PRs
  ══════════════════════════════════════════════ */
  function init() {
    db.collection('eventi').orderBy('date', 'desc').onSnapshot(snap => {
      events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderEvento();
    });

    db.collection('utenti').onSnapshot(snap => {
      prs = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(u => {
          const hasPR = u.role === 'pr' || (u.extraRoles || []).includes('pr');
          if (!hasPR) return false;
          if (!isSuperAdmin && u.owner !== adminNome) return false;
          return true;
        })
        .map(u => ({ id: u.id, nome: u.nome || u.username, owner: u.owner || '', level: u.level || 1 }))
        .sort((a,b) => a.nome.localeCompare(b.nome));
      renderEvento();
    });
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
