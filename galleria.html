<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Astra Events — I migliori eventi liceali di Roma. Prevendite, tavoli e contest." />
<meta name="keywords" content="eventi liceali roma, feste liceo roma, astra events" />
  <link rel="icon" type="image/jpeg" href="logo.jpg" />
  <title>Galleria — Astra Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF6B00; --orange2: #FF9A3C;
      --black: #0A0A0A; --surface: #111111; --surface2: #181818; --surface3: #1e1e1e;
      --border: rgba(255,107,0,.18); --border2: rgba(255,255,255,.07);
      --white: #FFFFFF; --muted: rgba(255,255,255,.45);
    }
    html { scroll-behavior: smooth; }
    body { background: var(--black); color: var(--white); font-family: 'Poppins', sans-serif; min-height: 100vh; overflow-x: hidden; }
    body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background: radial-gradient(ellipse at 15% 15%, rgba(255,107,0,.05) 0%, transparent 55%); }

    header { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.2rem clamp(1.5rem, 5vw, 4rem); border-bottom: 1px solid var(--border); background: rgba(10,10,10,.92); backdrop-filter: blur(14px); }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; letter-spacing: .1em; background: linear-gradient(120deg, var(--orange), var(--orange2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; }
    header nav a { font-size: .7rem; font-weight: 500; letter-spacing: .2em; text-transform: uppercase; color: var(--orange); text-decoration: none; transition: color .3s; }
    header nav a:hover { color: var(--white); }

    .hero { position: relative; z-index: 1; text-align: center; padding: clamp(3.5rem, 8vw, 6rem) clamp(1.5rem, 5vw, 4rem) clamp(2rem, 4vw, 3.5rem); }
    .pill { display: inline-flex; align-items: center; gap: .5rem; font-size: .62rem; font-weight: 500; letter-spacing: .32em; text-transform: uppercase; color: var(--orange); border: 1px solid var(--border); padding: .32rem 1rem; border-radius: 99px; margin-bottom: 1.5rem; }
    .pill-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--orange); box-shadow: 0 0 6px var(--orange); animation: blink 2s ease infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3.5rem, 9vw, 8rem); letter-spacing: .05em; line-height: .92; margin-bottom: 1.2rem; }
    .hero h1 em { font-style: normal; background: linear-gradient(120deg, var(--orange), var(--orange2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero p { font-size: clamp(.83rem, 1.4vw, 1rem); font-weight: 300; color: var(--muted); max-width: 420px; margin: 0 auto; line-height: 1.72; }

    .gallery-wrap { position: relative; z-index: 1; padding: 0 clamp(1.5rem, 5vw, 4rem) 6rem; max-width: 900px; margin: 0 auto; }
    .section-head { display: flex; align-items: center; gap: 1.2rem; margin-bottom: 1.8rem; }
    .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .section-head span { font-size: .62rem; font-weight: 500; letter-spacing: .32em; text-transform: uppercase; color: var(--orange); white-space: nowrap; }

    .event-folder { margin-bottom: .9rem; border-radius: 16px; overflow: hidden; border: 1px solid var(--border2); transition: border-color .25s; animation: rise .45s ease both; }
    .event-folder:hover { border-color: var(--border); }
    @keyframes rise { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

    .folder-banner { display: flex; align-items: center; gap: 1.2rem; padding: 1.1rem 1.5rem; background: var(--surface); cursor: pointer; user-select: none; transition: background .22s; }
    .folder-banner:hover { background: var(--surface2); }
    .event-folder.open .folder-banner { background: var(--surface2); border-bottom: 1px solid var(--border2); }

    .folder-icon { width: 44px; height: 38px; flex-shrink: 0; }
    .folder-icon svg { width: 44px; height: 38px; }
    .folder-info { flex: 1; min-width: 0; }
    .folder-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem; letter-spacing: .06em; color: var(--white); line-height: 1; margin-bottom: .22rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .folder-meta { font-size: .62rem; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; }
    .folder-arrow { width: 18px; height: 18px; flex-shrink: 0; opacity: .4; transition: transform .3s ease, opacity .22s; }
    .event-folder.open .folder-arrow { transform: rotate(180deg); opacity: .8; }

    .folder-panel-wrap { max-height: 0; overflow: hidden; transition: max-height .45s cubic-bezier(.22,1,.36,1); }
    .event-folder.open .folder-panel-wrap { max-height: 300px; }
    .folder-panel { background: var(--surface2); padding: 1.2rem 1.4rem; }

    .open-link-btn { display: flex; align-items: center; justify-content: center; gap: .6rem; width: 100%; padding: .9rem 1.4rem; background: var(--orange); color: #000; font-family: 'Poppins', sans-serif; font-size: .78rem; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; border-radius: 12px; text-decoration: none; transition: background .22s, transform .12s; }
    .open-link-btn:hover { background: var(--orange2); transform: translateY(-1px); }

    .no-link-msg { text-align: center; padding: 1.2rem; font-size: .72rem; color: var(--muted); letter-spacing: .1em; border: 1px dashed rgba(255,255,255,.1); border-radius: 12px; line-height: 1.7; }
    .no-link-msg strong { display: block; color: rgba(255,255,255,.3); font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: .1em; margin-bottom: .3rem; }

    footer { position: relative; z-index: 1; text-align: center; padding: 2rem; border-top: 1px solid var(--border); font-size: .62rem; letter-spacing: .25em; text-transform: uppercase; color: rgba(255,255,255,.18); }
    footer b { color: var(--orange); opacity: .5; font-weight: 400; margin: 0 .5rem; }
    @media (max-width: 580px) { }
  </style>
</head>
<body>

<header>
  <a class="logo" href="index.html">ASTRA</a>
  <nav><a href="index.html">← Home</a></nav>
</header>

<section class="hero">
  <div class="pill"><span class="pill-dot"></span>Le nostre serate</div>
  <h1>LA NOSTRA<br><em>GALLERIA</em></h1>
  <p>Rivivi i momenti più belli di ogni evento.</p>
</section>

<div class="gallery-wrap">
  <div class="section-head"><span>✦ Album eventi</span></div>
  <div id="folders-list"></div>
</div>

<footer>
  © 2026 Astra Events <b>✦</b> Roma, Italia <b>✦</b> I migliori eventi liceali
</footer>


<script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDCKDdde5PhjbZOWt2Tu-NR1esbV8LY5Jk",
    authDomain: "astra-events-338dd.firebaseapp.com",
    projectId: "astra-events-338dd",
    storageBucket: "astra-events-338dd.firebasestorage.app",
    messagingSenderId: "166914171655",
    appId: "1:166914171655:web:835d061dde01e5aab89ba2"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function formatDate(s) {
    if (!s) return '';
    return new Date(s + 'T00:00:00').toLocaleDateString('it-IT', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
  }

  function render(EVENTI) {
    const list   = document.getElementById('folders-list');
    list.innerHTML = '';
    const sorted = [...EVENTI].sort((a, b) => new Date(b.date) - new Date(a.date));

    if (!sorted.length) {
      list.innerHTML = '<div style="text-align:center;padding:3rem;font-size:.7rem;color:rgba(255,255,255,.2);letter-spacing:.2em;text-transform:uppercase;">Nessun evento ancora</div>';
      return;
    }

    sorted.forEach((ev, ei) => {
      let photoUrl = (ev.photoLink || '').trim();
      // Assicura che il link sia assoluto
      if (photoUrl && !photoUrl.match(/^https?:\/\//)) {
        photoUrl = 'https://' + photoUrl;
      }
      const hasLink = photoUrl !== '';
      const folder  = document.createElement('div');
      folder.className = 'event-folder';
      folder.style.animationDelay = (ei * 0.07) + 's';

      const linkContent = hasLink
        ? `<a class="open-link-btn" href="${photoUrl}" target="_blank" rel="noopener noreferrer">📷 &nbsp;Vedi tutte le foto &nbsp;↗</a>`
        : `<div class="no-link-msg">
             <strong>📷 FOTO IN ARRIVO</strong>
             Le foto di questo evento saranno disponibili a breve — torna presto!
           </div>`;

      folder.innerHTML = `
        <div class="folder-banner" onclick="toggle(this)">
          <div class="folder-icon">
            <svg viewBox="0 0 44 38" fill="none">
              <rect x="1" y="10" width="42" height="27" rx="4" fill="#1e1e1e" stroke="rgba(255,107,0,.35)" stroke-width="1.2"/>
              <path d="M1 14C1 11.8 2.8 10 5 10h12l3 4H39c2.2 0 4 1.8 4 4v16c0 2.2-1.8 4-4 4H5c-2.2 0-4-1.8-4-4V14z" fill="#242424" stroke="rgba(255,107,0,.5)" stroke-width="1.2"/>
              <rect x="3" y="4" width="18" height="8" rx="3" fill="#1a1a1a" stroke="rgba(255,107,0,.28)" stroke-width="1"/>
            </svg>
          </div>
          <div class="folder-info">
            <div class="folder-name">${ev.name}</div>
            <div class="folder-meta">${formatDate(ev.date)}</div>
          </div>
          <svg class="folder-arrow" viewBox="0 0 18 18" fill="none">
            <path d="M4 6.5l5 5 5-5" stroke="#FF6B00" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="folder-panel-wrap">
          <div class="folder-panel">${linkContent}</div>
        </div>`;

      list.appendChild(folder);
    });
  }

  function toggle(banner) {
    const folder = banner.closest('.event-folder');
    const isOpen = folder.classList.contains('open');
    document.querySelectorAll('.event-folder.open').forEach(f => f.classList.remove('open'));
    if (!isOpen) folder.classList.add('open');
  }

  db.collection('eventi').onSnapshot(snap => {
    const now = Date.now();
    render(snap.docs.map(d => d.data()).filter(ev => !ev.publishAt || ev.publishAt <= now));
  });
</script>
</body>
</html>
