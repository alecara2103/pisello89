<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Astra Events — I migliori eventi liceali di Roma. Prevendite, tavoli e contest." />
<meta name="keywords" content="eventi liceali roma, feste liceo roma, astra events" />
  <link rel="icon" type="image/jpeg" href="logo.jpg" />
  <title>Area PR — Astra Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF6B00; --orange2: #FF9A3C;
      --black: #0A0A0A; --s1: #111111; --s2: #181818;
      --border: rgba(255,107,0,.18); --white: #FFFFFF; --muted: rgba(255,255,255,.45);
    }
    html, body { width: 100%; min-height: 100%; background: var(--black); color: var(--white); font-family: 'Poppins', sans-serif; }

    .bg { position: fixed; inset: 0; background: url('background.png') center/cover no-repeat; z-index: 0; }
    .bg::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(0,0,0,.15) 0%, rgba(0,0,0,.6) 100%); }
    .grain { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: .04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 200px; }

    .stage { position: relative; z-index: 2; width: 100%; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; padding: 4rem 1.2rem 2.5rem; }

    .logo { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 8vw, 5rem); letter-spacing: .08em; background: linear-gradient(120deg, var(--orange), var(--orange2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .card { background: var(--s1); border: 1px solid var(--border); border-radius: 20px; padding: 1.8rem 1.4rem; text-align: center; max-width: 420px; width: 100%; animation: rise .5s ease both; }
    @keyframes rise { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .welcome { font-size: .62rem; font-weight: 500; letter-spacing: .32em; text-transform: uppercase; color: var(--orange); margin-bottom: .8rem; }
    .pr-name { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: .06em; margin-bottom: .5rem; }
    .pr-sub { font-size: .78rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.4rem; }

    .coming-box { background: var(--s2); border: 1px solid rgba(255,107,0,.12); border-radius: 14px; padding: 1.5rem; }
    .coming-icon { font-size: 2rem; margin-bottom: .7rem; opacity: .5; }
    .coming-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: .08em; color: rgba(255,255,255,.3); margin-bottom: .4rem; }
    .coming-text { font-size: .72rem; color: rgba(255,255,255,.2); letter-spacing: .12em; text-transform: uppercase; }

    .btn-logout { margin-top: 1.2rem; width: 100%; font-family: 'Poppins', sans-serif; font-size: .65rem; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); background: none; border: 1px solid rgba(255,255,255,.08); border-radius: 10px; padding: .6rem 1.4rem; cursor: pointer; transition: color .22s, border-color .22s; }
    .btn-logout:hover { color: var(--white); border-color: rgba(255,255,255,.2); }

    @media (max-width:480px) { .card { padding: 1.4rem 1rem; border-radius: 16px; } .logo { font-size: 2.8rem; } }
  
    /* ── Topbar nav ── */
    .topbar-nav{position:fixed;top:0;left:0;right:0;z-index:300;display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.2rem;background:rgba(10,10,10,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,107,0,.18);}
    .topbar-nav-links{display:flex;gap:.45rem;flex-wrap:wrap;}
    .topbar-nav-links a{font-family:'Poppins',sans-serif;font-size:.55rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;color:var(--orange);background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.25);padding:.28rem .7rem;border-radius:99px;transition:background .2s;white-space:nowrap;}
    .topbar-nav-links a:hover{background:rgba(255,107,0,.2);}
    .topbar-nav-pill{display:inline-flex;align-items:center;gap:.4rem;font-family:'Poppins',sans-serif;font-size:.55rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--orange);background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.25);padding:.28rem .7rem;border-radius:99px;white-space:nowrap;}
    .topbar-nav-dot{width:5px;height:5px;border-radius:50%;background:var(--orange);box-shadow:0 0 6px var(--orange);animation:tnblink 2s ease infinite;flex-shrink:0;}
    @keyframes tnblink{0%,100%{opacity:1}50%{opacity:.25}}
  </style>
</head>
<body>
<div class="topbar-nav">
  <div class="topbar-nav-links"><a href="index.html">← Home</a></div>
  <div class="topbar-nav-pill"><span class="topbar-nav-dot"></span>Area PR</div>
</div>

  <div class="bg"></div>
  <div class="grain"></div>
  <div class="stage">
    <div class="logo">ASTRA</div>
    <div class="card">
      <div class="welcome">Area PR</div>
      <div class="pr-name" id="pr-name">Benvenuto</div>
      <div class="pr-sub">Sei entrato nell'area riservata PR di Astra Events.</div>
      <div style="display:flex;flex-direction:column;gap:.7rem;width:100%;">
        <a href="MieStatistiche.html" style="display:flex;align-items:center;gap:1rem;background:var(--s2);border:1px solid rgba(255,107,0,.25);border-radius:14px;padding:1rem 1.2rem;text-decoration:none;transition:border-color .22s,background .22s;">
          <div style="font-size:1.5rem;">📊</div>
          <div style="text-align:left;">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em;color:#fff;">Le mie statistiche</div>
            <div style="font-size:.65rem;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-top:.1rem;">Biglietti · scarico · incasso</div>
          </div>
          <div style="margin-left:auto;color:var(--orange);font-size:1rem;">›</div>
        </a>

        <a href="Bacheca.html" style="display:flex;align-items:center;gap:1rem;background:var(--s2);border:1px solid rgba(255,107,0,.25);border-radius:14px;padding:1rem 1.2rem;text-decoration:none;transition:border-color .22s,background .22s;">
          <div style="font-size:1.5rem;">📢</div>
          <div style="text-align:left;">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em;color:#fff;">Bacheca</div>
            <div style="font-size:.65rem;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-top:.1rem;">Comunicazioni · dress code</div>
          </div>
          <div style="margin-left:auto;color:var(--orange);font-size:1rem;">›</div>
        </a>

        <a href="classifica.html" style="display:flex;align-items:center;gap:1rem;background:var(--s2);border:1px solid rgba(255,107,0,.25);border-radius:14px;padding:1rem 1.2rem;text-decoration:none;transition:border-color .22s,background .22s;">
          <div style="font-size:1.5rem;">🏆</div>
          <div style="text-align:left;">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em;color:#fff;">Classifica PR</div>
            <div style="font-size:.65rem;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-top:.1rem;">La tua posizione · quanto manca</div>
          </div>
          <div style="margin-left:auto;color:var(--orange);font-size:1rem;">›</div>
        </a>

        <a href="EntrateOmaggio.html" style="display:flex;align-items:center;gap:1rem;background:var(--s2);border:1px solid rgba(255,107,0,.25);border-radius:14px;padding:1rem 1.2rem;text-decoration:none;transition:border-color .22s,background .22s;">
          <div style="font-size:1.5rem;">🎟</div>
          <div style="text-align:left;">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em;color:#fff;">Entrate Omaggio</div>
            <div style="font-size:.65rem;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-top:.1rem;">Inserisci le entrate omaggio per evento</div>
          </div>
          <div style="margin-left:auto;color:var(--orange);font-size:1rem;">›</div>
        </a>
      </div>
      <button class="btn-logout" onclick="logout()">Esci dall'area PR</button>
    </div>
  </div>

  <script>
    // Protezione — solo PR loggati
    const role = sessionStorage.getItem('astra_role');
    const alias = sessionStorage.getItem('astra_alias') || localStorage.getItem('ls_astra_alias') || '';
    const nome = alias || sessionStorage.getItem('astra_nome') || sessionStorage.getItem('astra_user') || 'PR';
    if (!role) {
      window.location.href = 'index.html';
    } else if (role === 'admin') {
      window.location.href = 'PannelloAdmin.html';
    }
    document.getElementById('pr-name').textContent = nome;

    function logout() {
      sessionStorage.clear();
      window.location.href = 'index.html';
    }
  
    // Add ← Pannello link for admin users
    (function() {
      var role = sessionStorage.getItem('astraRole');
      if (role === 'admin') {
        var bar = document.getElementById('nav-back-bar');
        if (bar) {
          var a = document.createElement('a');
          a.href = 'PannelloAdmin.html';
          a.textContent = '← Pannello';
          a.style.marginLeft = '.5rem';
          bar.appendChild(a);
        }
      }
    })();

  </script>
</body>
</html>
