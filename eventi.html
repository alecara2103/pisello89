<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventi — Astra Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF6B00; --orange2: #FF9A3C;
      --black: #0A0A0A; --surface: #111111; --surface2: #181818;
      --border: rgba(255,107,0,.18); --white: #FFFFFF; --muted: rgba(255,255,255,.45);
    }
    html { scroll-behavior: smooth; }
    body { background: var(--black); color: var(--white); font-family: 'Poppins', sans-serif; min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse at 15% 15%, rgba(255,107,0,.05) 0%, transparent 50%),
                  radial-gradient(ellipse at 85% 85%, rgba(255,107,0,.04) 0%, transparent 50%);
    }

    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem clamp(1.5rem, 5vw, 4rem);
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,10,.9); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; letter-spacing: .1em; background: linear-gradient(120deg, var(--orange), var(--orange2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; }
    header nav a { font-family:'Poppins',sans-serif; font-size:.7rem; font-weight:500; letter-spacing:.2em; text-transform:uppercase; text-decoration:none; color:var(--orange); transition:color .2s; }
    header nav a:hover { color:#fff; }

    .hero { position: relative; z-index: 1; text-align: center; padding: clamp(3.5rem, 8vw, 6rem) clamp(1.5rem, 5vw, 4rem) clamp(2rem, 4vw, 3.5rem); }
    .pill { display: inline-flex; align-items: center; gap: .5rem; font-size: .62rem; font-weight: 500; letter-spacing: .32em; text-transform: uppercase; color: var(--orange); border: 1px solid var(--border); padding: .32rem 1rem; border-radius: 99px; margin-bottom: 1.5rem; }
    .pill-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--orange); box-shadow: 0 0 6px var(--orange); animation: blink 2s ease infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3.5rem, 9vw, 8rem); letter-spacing: .05em; line-height: .92; margin-bottom: 1.2rem; }
    .hero h1 em { font-style: normal; background: linear-gradient(120deg, var(--orange), var(--orange2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero p { font-size: clamp(.83rem, 1.4vw, 1rem); font-weight: 300; color: var(--muted); max-width: 460px; margin: 0 auto; line-height: 1.72; }

    .section-head { position: relative; z-index: 1; display: flex; align-items: center; gap: 1.2rem; padding: 0 clamp(1.5rem, 5vw, 4rem); margin-bottom: 2.5rem; }
    .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .section-head span { font-size: .62rem; font-weight: 500; letter-spacing: .32em; text-transform: uppercase; color: var(--orange); white-space: nowrap; }

    .events-wrap { position: relative; z-index: 1; padding: 0 clamp(1.5rem, 5vw, 4rem) 6rem; }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 340px), 1fr)); gap: clamp(1.2rem, 2.5vw, 2rem); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; transition: transform .32s ease, border-color .32s ease, box-shadow .32s ease; animation: rise .5s ease both; }
    @keyframes rise { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
    .card:hover { transform: translateY(-7px); border-color: rgba(255,107,0,.5); box-shadow: 0 16px 48px rgba(255,107,0,.13); }
    .card-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: var(--surface2); }
    .card-placeholder { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg, #150800, #240e00); display: flex; align-items: center; justify-content: center; }
    .card-body { padding: 1.4rem 1.6rem 1.7rem; }
    .card-date { font-size: .65rem; font-weight: 500; letter-spacing: .22em; text-transform: uppercase; color: var(--orange); margin-bottom: .55rem; }
    .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; letter-spacing: .04em; line-height: 1.08; color: var(--white); margin-bottom: .75rem; }
    .card-desc { font-size: .82rem; font-weight: 300; color: var(--muted); line-height: 1.68; }
    .card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 1.3rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .badge { font-size: .6rem; font-weight: 500; letter-spacing: .16em; text-transform: uppercase; color: var(--orange); background: rgba(255,107,0,.08); border: 1px solid rgba(255,107,0,.2); padding: .26rem .7rem; border-radius: 99px; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--orange); box-shadow: 0 0 8px var(--orange); animation: blink 2s ease infinite; }

    .status-badge { font-size: .6rem; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; padding: .26rem .75rem; border-radius: 99px; border: 1px solid; }
    .status-upcoming { color: #F6E05E; background: rgba(246,224,94,.08); border-color: rgba(246,224,94,.35); }
    .status-today    { color: #68D391; background: rgba(104,211,145,.08); border-color: rgba(104,211,145,.3); }
    .status-past     { color: #FF2020; background: rgba(255,32,32,.08); border-color: rgba(255,32,32,.4); }
    .status-soldout  { color: #FF0000; background: rgba(255,0,0,.12); border-color: rgba(255,0,0,.6); font-weight: 700; text-shadow: 0 0 8px rgba(255,0,0,.5); }
    .card.past { opacity: .55; filter: grayscale(.4); }
    .card.past:hover { opacity: .75; filter: grayscale(.2); }

    .card-btns { display: flex; gap: .7rem; margin-top: 1rem; flex-wrap: wrap; }
    .btn-prevendita, .btn-tavolo { flex: 1; text-align: center; font-family: 'Poppins', sans-serif; font-size: .62rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; text-decoration: none; border-radius: 8px; padding: .55rem .5rem; transition: background .25s, color .25s, transform .12s; white-space: nowrap; }
    .btn-prevendita { background: var(--orange); color: #000; border: 1px solid var(--orange); }
    .btn-prevendita:hover { background: var(--orange2); border-color: var(--orange2); }
    .btn-tavolo { background: transparent; color: var(--orange); border: 1px solid rgba(255,107,0,.4); }
    .btn-tavolo:hover { background: rgba(255,107,0,.1); border-color: var(--orange); }
    .btn-prevendita:active, .btn-tavolo:active { transform: scale(.97); }
    .btn-closed { flex: 1; text-align: center; font-family: 'Poppins', sans-serif; font-size: .62rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; border-radius: 8px; padding: .55rem .5rem; background: rgba(255,255,255,.04); color: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.08); cursor: not-allowed; pointer-events: none; opacity: .5; white-space: nowrap; }

    /* ── Partecipazione ── */
    .partecipa-section { border-top: 1px solid rgba(255,255,255,.06); margin-top: 1rem; padding-top: 1rem; display: flex; flex-direction: column; gap: .65rem; }
    .partecipa-row { display: flex; align-items: center; justify-content: space-between; gap: .8rem; }
    .partecipa-label { font-size: .72rem; color: var(--muted); font-weight: 500; }
    .partecipa-label.dimmed { opacity: .35; pointer-events: none; }

    /* Switch */
    .sw { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .sw input { opacity: 0; width: 0; height: 0; position: absolute; }
    .sw-track { position: absolute; inset: 0; background: rgba(255,255,255,.1); border-radius: 99px; cursor: pointer; transition: background .25s; border: 1px solid rgba(255,255,255,.08); }
    .sw input:checked + .sw-track { background: var(--orange); border-color: var(--orange); }
    .sw-track::after { content:''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: transform .25s cubic-bezier(.22,1,.36,1); box-shadow: 0 1px 4px rgba(0,0,0,.3); }
    .sw input:checked + .sw-track::after { transform: translateX(18px); }
    .sw.disabled .sw-track { opacity: .3; cursor: not-allowed; }

    /* Bottone partecipanti */
    .btn-partecipanti { display: flex; align-items: center; gap: .5rem; font-family: 'Poppins', sans-serif; font-size: .62rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; background: rgba(255,255,255,.05); color: rgba(255,255,255,.55); border: 1px solid rgba(255,255,255,.1); border-radius: 8px; padding: .45rem .85rem; cursor: pointer; transition: all .22s; width: 100%; justify-content: center; }
    .btn-partecipanti:hover { background: rgba(255,107,0,.1); color: var(--orange); border-color: rgba(255,107,0,.3); }
    .btn-partecipanti .count-badge { background: var(--orange); color: #000; border-radius: 99px; padding: .05rem .45rem; font-size: .58rem; font-weight: 700; min-width: 18px; text-align: center; }

    /* Modal partecipanti */
    .modal-part { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,.75); backdrop-filter: blur(6px); align-items: center; justify-content: center; padding: 1.5rem; }
    .modal-part.open { display: flex; }
    .modal-part-box { background: #111; border: 1px solid rgba(255,107,0,.25); border-radius: 20px; padding: 1.8rem; width: 100%; max-width: 400px; max-height: 80vh; display: flex; flex-direction: column; animation: popIn .3s cubic-bezier(.22,1,.36,1) both; }
    @keyframes popIn { from{opacity:0;transform:scale(.94)} to{opacity:1;transform:scale(1)} }
    .modal-part-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; }
    .modal-part-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: .06em; }
    .modal-part-close { background: none; border: none; color: rgba(255,255,255,.3); font-size: 1.1rem; cursor: pointer; }
    .modal-part-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: .5rem; }
    .part-item { display: flex; align-items: center; gap: .85rem; background: #181818; border-radius: 10px; padding: .7rem .9rem; }
    .part-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--orange), var(--orange2)); display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; color: #000; flex-shrink: 0; overflow: hidden; }
    .part-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .part-name { font-size: .82rem; font-weight: 500; color: var(--white); }
    .part-anon { font-size: .72rem; color: rgba(255,255,255,.3); font-style: italic; }
    .part-empty { text-align: center; padding: 2rem; font-size: .72rem; color: rgba(255,255,255,.2); letter-spacing: .18em; text-transform: uppercase; }

    .empty { grid-column: 1/-1; text-align: center; padding: 5rem 2rem; }
    .empty-icon { font-size: 2.8rem; margin-bottom: 1rem; opacity: .18; }
    .empty h3 { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: .08em; color: rgba(255,255,255,.22); margin-bottom: .5rem; }
    .empty p { font-size: .75rem; color: rgba(255,255,255,.18); letter-spacing: .18em; text-transform: uppercase; }

    footer { position: relative; z-index: 1; text-align: center; padding: 2rem; border-top: 1px solid var(--border); font-size: .62rem; letter-spacing: .25em; text-transform: uppercase; color: rgba(255,255,255,.18); }
    footer b { color: var(--orange); opacity: .5; font-weight: 400; margin: 0 .5rem; }

    @media (max-width: 580px) { header nav a { font-size:.55rem; letter-spacing:.1em; } #grid { grid-template-columns: 1fr; } }
    @media (min-width: 1900px) { #grid { grid-template-columns: repeat(4, 1fr); } }

    /* ── Admin indicator ── */
    .admin-indicator {
      display: none; align-items: center; gap: .5rem;
      font-size: .6rem; font-weight: 500; letter-spacing: .18em; text-transform: uppercase;
      color: var(--orange); background: rgba(255,107,0,.1);
      border: 1px solid rgba(255,107,0,.3); padding: .28rem .75rem;
      border-radius: 99px; cursor: pointer; transition: background .22s;
    }
    .admin-indicator:hover { background: rgba(255,107,0,.2); }
    .admin-indicator.visible { display: flex; }

    /* ── Nav buttons (home / pannello) ── */
    .nav-back {
      position: fixed; top: 1.2rem; left: 1.2rem; z-index: 200;
      display: flex; align-items: center; gap: .8rem;
    }
    .nav-back a {
      display: inline-flex; align-items: center; gap: .4rem;
      font-family: 'Poppins', sans-serif; font-size: .6rem;
      font-weight: 500; letter-spacing: .18em; text-transform: uppercase;
      text-decoration: none; color: var(--orange);
      background: rgba(255,107,0,.1); border: 1px solid rgba(255,107,0,.3);
      padding: .28rem .85rem; border-radius: 99px;
      transition: background .22s, border-color .22s;
      backdrop-filter: blur(8px);
    }
    .nav-back a:hover { background: rgba(255,107,0,.22); border-color: var(--orange); }
  </style>
</head>
<body>
<header>
  <a class="logo" href="index.html">ASTRA</a>
  <nav><a href="index.html">← Home</a></nav>
      <span class="admin-indicator" id="admin-indicator" onclick="adminLogout()" title="Clicca per uscire da admin">⚙ Admin ● <span style="font-size:.55rem;opacity:.7;">Esci</span></span>
</header>

<section class="hero">
  <div class="pill"><span class="pill-dot"></span>Calendario 2026</div>
  <h1>I NOSTRI<br><em>EVENTI</em></h1>
  <p>Tutti i migliori eventi liceali in una sola pagina.</p>
</section>

<div class="section-head"><span>✦ Prossimi eventi</span></div>

<div class="events-wrap">
  <div id="grid"></div>
</div>

<!-- Modal partecipanti -->
<div class="modal-part" id="modal-part">
  <div class="modal-part-box">
    <div class="modal-part-hdr">
      <div>
        <div class="modal-part-title" id="modal-part-title">Partecipanti</div>
        <div style="font-size:.62rem;color:rgba(255,107,0,.7);letter-spacing:.14em;text-transform:uppercase;" id="modal-part-sub"></div>
      </div>
      <button class="modal-part-close" onclick="closePartModal()">✕</button>
    </div>
    <div class="modal-part-list" id="modal-part-list">
      <div class="part-empty">Caricamento…</div>
    </div>
  </div>
</div>

<footer>
  © 2026 Astra Events <b>✦</b> Roma, Italia <b>✦</b> I migliori parti liceali
</footer>


<script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDCKDdde5PhjbZOWt2Tu-NR1esbV8LY5Jk",
    authDomain: "astra-events-338dd.firebaseapp.com",
    projectId: "astra-events-338dd",
    storageBucket: "astra-events-338dd.firebasestorage.app",
    messagingSenderId: "166914171655",
    appId: "1:166914171655:web:835d061dde01e5aab89ba2"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function formatDate(s) {
    if (!s) return '';
    return new Date(s + 'T00:00:00').toLocaleDateString('it-IT', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
  }

  function getStatus(ev) {
    if (ev.status === 'past' || ev.status === 'today' || ev.status === 'upcoming' || ev.status === 'soldout') return ev.status;
    const today = new Date(); today.setHours(0,0,0,0);
    const date  = new Date(ev.date + 'T00:00:00');
    if (date.toDateString() === today.toDateString()) return 'today';
    if (date < today) return 'past';
    return 'upcoming';
  }

  function render(EVENTI) {
    const grid  = document.getElementById('grid');
    grid.innerHTML = '';
    const today = new Date(); today.setHours(0,0,0,0);

    const upcoming = [...EVENTI].filter(e => new Date(e.date + 'T00:00:00') >= today)
                                .sort((a, b) => new Date(b.date) - new Date(a.date));
    const past     = [...EVENTI].filter(e => new Date(e.date + 'T00:00:00') <  today)
                                .sort((a, b) => new Date(b.date) - new Date(a.date));
    const evs = [...upcoming, ...past];

    if (!evs.length) {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-icon">✦</div>
          <h3>Nessun evento</h3>
          <p>Torna presto — i prossimi eventi sono in arrivo</p>
        </div>`;
      return;
    }

    evs.forEach((ev, i) => {
      const status = getStatus(ev);
      const statusLabel = status === 'past'    ? '● Evento concluso'
                        : status === 'today'   ? '● In corso'
                        : status === 'soldout' ? '● Sold Out'
                        :                      '● Prossimamente';

      const img = (ev.imageUrl || ev.image)
        ? `<img class="card-img" src="${ev.imageUrl || ev.image}" alt="${ev.name}" loading="lazy">`
        : `<div class="card-placeholder">
             <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
               <path d="M22 3l3 10 10 3-10 3-3 10-3-10-10-3 10-3z" fill="#FF6B00" opacity=".35"/>
             </svg>
           </div>`;

      const card = document.createElement('article');
      card.className = `card${(status === 'past' || status === 'soldout') ? ' past' : ''}`;
      card.style.animationDelay = `${i * 0.07}s`;
      card.innerHTML = `
        ${img}
        <div class="card-body">
          <div class="card-date">${formatDate(ev.date)}</div>
          <h2 class="card-title">${ev.name}</h2>
          <p class="card-desc">${ev.description || ''}</p>
          <div class="card-foot">
            <span class="badge">Astra Events</span>
            <span class="status-badge status-${status}">${statusLabel}</span>
          </div>
          <div class="card-btns">
            ${(status === 'past' || status === 'soldout')
              ? `<span class="btn-closed">🔒 ${status === 'soldout' ? 'Sold Out' : 'Prenotazioni chiuse'}</span>`
              : `<a class="btn-prevendita" href="prevendite.html?evento=${ev._id}">🎟 Prenota prevendita</a>
                 <a class="btn-tavolo" href="tavoli.html?evento=${ev._id}">🍾 Prenota tavolo</a>`
            }
          </div>

          <!-- Sezione partecipazione -->
          <div class="partecipa-section">
            ${status !== 'past' ? `
            <div class="partecipa-row">
              <span class="partecipa-label" id="lbl-ci-${ev._id}">🙋 Sarò all'evento</span>
              <label class="sw" id="sw-ci-wrap-${ev._id}">
                <input type="checkbox" id="sw-ci-${ev._id}" onchange="togglePartecipa('${ev._id}', this.checked)" />
                <span class="sw-track"></span>
              </label>
            </div>
            <div class="partecipa-row">
              <span class="partecipa-label" id="lbl-an-${ev._id}">🕵️ Anonimo</span>
              <label class="sw disabled" id="sw-an-wrap-${ev._id}">
                <input type="checkbox" id="sw-an-${ev._id}" disabled onchange="toggleAnonimo('${ev._id}', this.checked)" />
                <span class="sw-track"></span>
              </label>
            </div>` : ''}
            <button class="btn-partecipanti" onclick="openPartModal('${ev._id}', '${ev.name.replace(/'/g,"\\'")}')">
              👥 ${status === 'past' ? 'Chi c\'era' : 'Vedi partecipanti'} <span class="count-badge" id="count-${ev._id}">0</span>
            </button>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }

  // Admin indicator
  (function() {
    if (sessionStorage.getItem('astra_admin') === '1') {
      const el = document.getElementById('admin-indicator');
      if (el) el.classList.add('visible');
    }
  })();
  function adminLogout() {
    if (confirm('Uscire dalla modalità admin?')) {
      sessionStorage.removeItem('astra_admin');
      document.getElementById('admin-indicator').classList.remove('visible');
    }
  }

  /* ── Utente loggato ── */
  const sessRole = sessionStorage.getItem('astra_role');
  const sessUser = sessionStorage.getItem('astra_user');
  const lsUser   = localStorage.getItem('astra_rewards_user');
  const loggedUser = sessUser || lsUser || null;

  /* ── Partecipazione: carica stato per tutti gli eventi ── */
  const partecipaListeners = {};

  function initPartecipazione(evId) {
    // Ascolta in realtime i partecipanti per il conteggio
    if (partecipaListeners[evId]) return;
    partecipaListeners[evId] = db.collection('partecipanti').doc(evId)
      .onSnapshot(snap => {
        const data = snap.exists ? snap.data() : {};
        const lista = data.lista || [];
        const countEl = document.getElementById('count-' + evId);
        if (countEl) countEl.textContent = lista.length;

        // Se loggato, ripristina stato switch
        if (loggedUser) {
          const mio = lista.find(p => p.username === loggedUser);
          const swCi = document.getElementById('sw-ci-' + evId);
          const swAn = document.getElementById('sw-an-' + evId);
          const swAnWrap = document.getElementById('sw-an-wrap-' + evId);
          if (swCi) swCi.checked = !!mio;
          if (swAn) {
            swAn.checked = mio ? !!mio.anonimo : false;
            swAn.disabled = !mio;
            if (swAnWrap) swAnWrap.classList.toggle('disabled', !mio);
          }
        }
      });
  }

  /* ── Toggle partecipazione ── */
  async function togglePartecipa(evId, checked) {
    if (!loggedUser) {
      alert('Accedi per indicare la tua partecipazione.');
      document.getElementById('sw-ci-' + evId).checked = false;
      return;
    }

    const swAn     = document.getElementById('sw-an-' + evId);
    const swAnWrap = document.getElementById('sw-an-wrap-' + evId);

    try {
      const ref  = db.collection('partecipanti').doc(evId);
      const snap = await ref.get();
      const data = snap.exists ? snap.data() : { lista: [] };
      let lista  = data.lista || [];

      if (checked) {
        if (!lista.find(p => p.username === loggedUser)) {
          // Carica dati — staff da 'utenti', utenti normali da 'utentiAstra'
          const staffRole = sessionStorage.getItem('astra_role');
          const isStaffUser = staffRole === 'admin' || staffRole === 'pr';
          const col = isStaffUser ? 'utenti' : 'utentiAstra';
          const uSnap = await db.collection(col).doc(loggedUser).get();
          const u = uSnap.exists ? uSnap.data() : {};
          const anonimoDefault = isStaffUser ? false : !!u.anonimoDefault;
          const displayNome = u.alias || (isStaffUser ? (u.nome || loggedUser) : (u.nome || loggedUser));
          const displayCognome = u.alias ? '' : (isStaffUser ? '' : (u.cognome || ''));
          lista.push({
            username: loggedUser,
            nome:     displayNome,
            cognome:  displayCognome,
            fotoUrl:  u.fotoUrl || '',
            ruolo:    isStaffUser ? staffRole : null,
            anonimo:  anonimoDefault,
            ts: Date.now()
          });
          if (swAn) swAn.checked = anonimoDefault;
        }
        if (swAn) swAn.disabled = false;
        if (swAnWrap) swAnWrap.classList.remove('disabled');
      } else {
        lista = lista.filter(p => p.username !== loggedUser);
        if (swAn) { swAn.checked = false; swAn.disabled = true; }
        if (swAnWrap) swAnWrap.classList.add('disabled');
      }

      await ref.set({ lista }, { merge: true });
    } catch(e) {
      console.error('togglePartecipa:', e);
    }
  }

  /* ── Toggle anonimo ── */
  async function toggleAnonimo(evId, checked) {
    if (!loggedUser) return;
    try {
      const ref  = db.collection('partecipanti').doc(evId);
      const snap = await ref.get();
      if (!snap.exists) return;
      const lista = (snap.data().lista || []).map(p =>
        p.username === loggedUser ? { ...p, anonimo: checked } : p
      );
      await ref.update({ lista });
    } catch(e) { console.error('toggleAnonimo:', e); }
  }

  /* ── Modal partecipanti ── */
  function openPartModal(evId, evName) {
    document.getElementById('modal-part-title').textContent = 'Partecipanti';
    document.getElementById('modal-part-sub').textContent   = evName;
    document.getElementById('modal-part').classList.add('open');
    loadPartList(evId);
  }

  function closePartModal() {
    document.getElementById('modal-part').classList.remove('open');
  }

  async function loadPartList(evId) {
    const list = document.getElementById('modal-part-list');
    list.innerHTML = '<div class="part-empty">Caricamento…</div>';
    const snap = await db.collection('partecipanti').doc(evId).get();
    const lista = snap.exists ? (snap.data().lista || []) : [];

    if (!lista.length) {
      list.innerHTML = '<div class="part-empty">Nessun partecipante ancora</div>';
      return;
    }

    list.innerHTML = '';
    lista.forEach(p => {
      const item = document.createElement('div');
      item.className = 'part-item';
      if (p.anonimo) {
        item.innerHTML = `
          <div class="part-avatar" style="background:#222;color:rgba(255,255,255,.3);font-size:1.1rem;">?</div>
          <div>
            <div class="part-name" style="color:rgba(255,255,255,.4);">Anonimo</div>
            <div class="part-anon">Partecipante anonimo</div>
          </div>`;
      } else {
        const initials = ((p.nome?.[0] || '') + (p.cognome?.[0] || '')).toUpperCase() || '?';
        const avatarContent = p.fotoUrl
          ? `<img src="${p.fotoUrl}" alt="${p.nome}" />`
          : initials;

        // Badge ruolo — solo PR e Admin, mai il nome specifico
        let roleBadge = '';
        if (p.ruolo === 'admin') {
          roleBadge = `<span style="font-size:.52rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:rgba(255,107,0,.15);color:var(--orange);border:1px solid rgba(255,107,0,.35);border-radius:6px;padding:.1rem .4rem;margin-left:.4rem;">Admin</span>`;
        } else if (p.ruolo === 'pr') {
          roleBadge = `<span style="font-size:.52rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:rgba(99,179,237,.12);color:#63B3ED;border:1px solid rgba(99,179,237,.3);border-radius:6px;padding:.1rem .4rem;margin-left:.4rem;">PR</span>`;
        }

        item.innerHTML = `
          <div class="part-avatar">${avatarContent}</div>
          <div style="display:flex;align-items:center;flex-wrap:wrap;gap:.2rem;">
            <span class="part-name">${p.nome}${p.cognome ? ' ' + p.cognome : ''}</span>
            ${roleBadge}
          </div>`;
      }
      list.appendChild(item);
    });
  }

  // Chiudi modal cliccando fuori
  document.getElementById('modal-part').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-part')) closePartModal();
  });

  // Inizializza partecipazione dopo ogni render — override sicuro
  db.collection('eventi').onSnapshot(snap => {
    const now = Date.now();
    const EVENTI = snap.docs
      .filter(d => !d.data().publishAt || d.data().publishAt <= now)
      .map(d => ({ _id: d.id, ...d.data() }));
    render(EVENTI);
    EVENTI.forEach(ev => initPartecipazione(ev._id));
  }, err => {
    console.error('Firebase error:', err);
    document.getElementById('grid').innerHTML = `
      <div class="empty">
        <div class="empty-icon">✦</div>
        <h3>Errore caricamento</h3>
        <p>${err.message}</p>
      </div>`;
  });
</script>
</body>
</html>
