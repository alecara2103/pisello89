<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Astra Events — I migliori eventi liceali di Roma. Prevendite, tavoli e contest." />
<meta name="keywords" content="eventi liceali roma, feste liceo roma, astra events" />
  <link rel="icon" type="image/jpeg" href="logo.jpg" />
  <title>Gestione PR — Astra Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF6B00; --orange2: #FF9A3C;
      --black: #0A0A0A; --s1: #111111; --s2: #181818; --s3: #222222;
      --border: rgba(255,107,0,.18); --border2: rgba(255,255,255,.07);
      --white: #FFFFFF; --muted: rgba(255,255,255,.4);
      --green: #68D391; --blue: #63B3ED; --purple: #A78BFA; --yellow: #F6E05E; --red: #FC8181;
    }
    body { background: var(--black); color: var(--white); font-family: 'Poppins', sans-serif; min-height: 100vh; }
    body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background: radial-gradient(ellipse at 20% 10%, rgba(255,107,0,.06) 0%, transparent 55%); }

    /* ── NAV ── */
    .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 200; display: flex; align-items: center; justify-content: space-between; padding: .8rem 1.2rem; background: rgba(10,10,10,.9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border2); }
    .topbar-links { display: flex; gap: .45rem; }
    .topbar-links a { font-size: .55rem; font-weight: 500; letter-spacing: .14em; text-transform: uppercase; text-decoration: none; color: var(--orange); background: rgba(255,107,0,.1); border: 1px solid rgba(255,107,0,.25); padding: .28rem .7rem; border-radius: 99px; transition: background .2s; white-space: nowrap; }
    .topbar-links a:hover { background: rgba(255,107,0,.2); }
    .btn-exit { font-family: 'Poppins', sans-serif; font-size: .55rem; font-weight: 500; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); background: none; border: 1px solid var(--border2); border-radius: 8px; padding: .28rem .7rem; cursor: pointer; transition: color .2s, border-color .2s; }
    .btn-exit:hover { color: var(--white); border-color: rgba(255,255,255,.2); }

    /* ── HERO ── */
    .hero { position: relative; z-index: 1; text-align: center; padding: 5.5rem 1.5rem 2rem; }
    .pill { display: inline-flex; align-items: center; gap: .45rem; font-size: .58rem; font-weight: 500; letter-spacing: .28em; text-transform: uppercase; color: var(--orange); border: 1px solid var(--border); padding: .28rem .9rem; border-radius: 99px; margin-bottom: 1rem; }
    .pill-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--orange); box-shadow: 0 0 6px var(--orange); animation: blink 2s ease infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
    .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.8rem, 8vw, 5.5rem); letter-spacing: .04em; line-height: .9; }
    .hero h1 em { font-style: normal; background: linear-gradient(120deg, var(--orange), var(--orange2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* ── PAGE BODY ── */
    .page { position: relative; z-index: 1; padding: 0 clamp(1rem, 4vw, 2.5rem) 5rem; max-width: 1100px; margin: 0 auto; }

    /* ── SECTION HEAD ── */
    .sec { margin-bottom: 2rem; }
    .sec-head { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.2rem; }
    .sec-head::after { content:''; flex:1; height:1px; background: var(--border); }
    .sec-head span { font-size: .58rem; font-weight: 600; letter-spacing: .28em; text-transform: uppercase; color: var(--orange); white-space: nowrap; }

    /* ── CREATE FORM ── */
    .form-card { background: var(--s1); border: 1px solid var(--border); border-radius: 18px; padding: 1.5rem; }
    .f { margin-bottom: .85rem; }
    .f label { display: block; font-size: .58rem; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: .35rem; }
    .f input, .f select { width: 100%; background: var(--s2); border: 1px solid var(--border2); border-radius: 10px; color: var(--white); font-family: 'Poppins', sans-serif; font-size: .88rem; padding: .72rem 1rem; outline: none; transition: border-color .2s; appearance: none; }
    .f input:focus, .f select:focus { border-color: var(--orange); }
    .f input::placeholder { color: rgba(255,255,255,.2); }
    .input-wrap { position: relative; }
    .input-wrap input { padding-right: 2.8rem; }
    .btn-eye { position: absolute; right: .8rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: .95rem; opacity: .4; transition: opacity .2s; padding: 0; }
    .btn-eye:hover { opacity: 1; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

    .btn-create { width: 100%; background: var(--orange); color: #000; font-family: 'Poppins', sans-serif; font-size: .78rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; border: none; border-radius: 10px; padding: .9rem; cursor: pointer; transition: background .2s, transform .12s; margin-top: .3rem; }
    .btn-create:hover { background: var(--orange2); }
    .btn-create:active { transform: scale(.98); }
    .btn-create:disabled { opacity: .5; cursor: not-allowed; }

    .msg-ok  { display:none; margin-top:.75rem; font-size:.75rem; color:var(--green); background:rgba(104,211,145,.07); border:1px solid rgba(104,211,145,.25); border-radius:10px; padding:.7rem 1rem; text-align:center; }
    .msg-err { display:none; margin-top:.75rem; font-size:.75rem; color:var(--red); background:rgba(252,129,129,.07); border:1px solid rgba(252,129,129,.22); border-radius:10px; padding:.7rem 1rem; text-align:center; }

    /* ── USER CARD ── */
    .user-card {
      background: var(--s1);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 1.1rem 1.2rem;
      margin-bottom: .75rem;
      transition: border-color .22s;
    }
    .user-card:hover { border-color: rgba(255,107,0,.22); }

    /* Row 1: avatar + name */
    .uc-header { display: flex; align-items: center; gap: .8rem; margin-bottom: .6rem; }
    .uc-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .95rem; flex-shrink: 0; }
    .uc-avatar.is-admin { background: rgba(255,107,0,.12); border: 1.5px solid rgba(255,107,0,.3); }
    .uc-avatar.is-pr    { background: rgba(99,179,237,.1);  border: 1.5px solid rgba(99,179,237,.28); }
    .uc-name { font-size: 1rem; font-weight: 600; color: var(--white); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Row 2: badges */
    .uc-badges { display: flex; flex-wrap: wrap; gap: .3rem; margin-bottom: .55rem; }
    .badge {
      display: inline-flex; align-items: center; gap: .25rem;
      font-size: .52rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
      padding: .2rem .55rem; border-radius: 6px; white-space: nowrap;
    }
    .badge-admin { background: rgba(255,107,0,.12); border: 1px solid rgba(255,107,0,.3);  color: var(--orange); }
    .badge-pr    { background: rgba(99,179,237,.1);  border: 1px solid rgba(99,179,237,.28); color: var(--blue); }
    .badge-ale   { background: rgba(255,154,60,.12); border: 1px solid rgba(255,154,60,.35); color: var(--orange2); }
    .badge-jajo  { background: rgba(167,139,250,.1); border: 1px solid rgba(167,139,250,.3); color: var(--purple); }
    .badge-lv0   { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.35); }
    .badge-lv1   { background: rgba(104,211,145,.1); border: 1px solid rgba(104,211,145,.3); color: var(--green); }
    .badge-lv2   { background: rgba(246,224,94,.1);  border: 1px solid rgba(246,224,94,.3);  color: var(--yellow); }
    .badge-lv3   { background: rgba(252,129,129,.1); border: 1px solid rgba(252,129,129,.3); color: var(--red); }

    /* Row 3: username / password */
    .uc-meta { font-size: .7rem; color: var(--muted); margin-bottom: .85rem; font-family: 'Courier New', monospace; letter-spacing: .03em; }
    .uc-meta strong { color: rgba(255,255,255,.65); font-weight: 500; font-family: 'Poppins', sans-serif; }

    /* Row 4: action buttons 2×2 */
    .uc-actions { display: grid; grid-template-columns: 1fr 1fr; gap: .45rem; }
    .uc-btn {
      font-family: 'Poppins', sans-serif; font-size: .65rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      border-radius: 9px; padding: .55rem .5rem;
      cursor: pointer; border: 1px solid; transition: background .2s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: .3rem;
      white-space: nowrap;
    }
    .uc-btn:active { transform: scale(.97); }
    .uc-btn:disabled { opacity: .3; cursor: not-allowed; }
    .uc-eye  { background: rgba(99,179,237,.08);  border-color: rgba(99,179,237,.25);  color: var(--blue); }
    .uc-eye:hover  { background: rgba(99,179,237,.16); }
    .uc-pwd  { background: rgba(246,224,94,.08);  border-color: rgba(246,224,94,.22);  color: var(--yellow); }
    .uc-pwd:hover  { background: rgba(246,224,94,.16); }
    .uc-del  { background: rgba(252,129,129,.07); border-color: rgba(252,129,129,.2);  color: var(--red); }
    .uc-del:hover  { background: rgba(252,129,129,.14); }

    /* Level select styled as button */
    .uc-lv-select {
      font-family: 'Poppins', sans-serif; font-size: .65rem; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      border-radius: 9px; padding: .55rem .5rem;
      cursor: pointer; outline: none; appearance: none;
      width: 100%; text-align: center; transition: background .2s;
    }

    .empty-list { text-align: center; padding: 3rem 1rem; font-size: .7rem; color: rgba(255,255,255,.18); letter-spacing: .2em; text-transform: uppercase; }

    /* Tabs */
  .page-tabs { display:flex; gap:.4rem; margin-bottom:1.5rem; background:var(--s1); border:1px solid var(--border); border-radius:14px; padding:.3rem; }
  .page-tab { flex:1; font-family:'Poppins',sans-serif; font-size:.65rem; font-weight:500; letter-spacing:.14em; text-transform:uppercase; background:none; border:none; color:var(--muted); padding:.55rem; border-radius:10px; cursor:pointer; transition:background .22s,color .22s; text-align:center; }
  .page-tab.active { background:var(--orange); color:#000; }
  .page-tab:not(.active):hover { background:rgba(255,107,0,.1); color:var(--orange); }

  /* Utenti table */
  .utenti-grid { display:flex; flex-direction:column; gap:.7rem; }
  .utente-card { background:var(--s1); border:1px solid var(--border2); border-radius:14px; padding:1rem 1.2rem; display:flex; align-items:center; gap:1rem; flex-wrap:wrap; transition:border-color .22s; }
  .utente-card:hover { border-color:rgba(255,107,0,.2); }
  .utente-avatar { width:38px; height:38px; border-radius:50%; background:rgba(99,179,237,.1); border:1.5px solid rgba(99,179,237,.25); display:flex; align-items:center; justify-content:center; font-size:.95rem; flex-shrink:0; }
  .utente-info { flex:1; min-width:160px; }
  .utente-name { font-size:.92rem; font-weight:600; color:var(--white); }
  .utente-meta { font-size:.68rem; color:var(--muted); margin-top:.15rem; line-height:1.55; }
  .utente-meta span { color:rgba(255,255,255,.55); }
  .utente-pts { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; color:var(--orange); letter-spacing:.04em; flex-shrink:0; }
  .utente-pts-label { font-size:.52rem; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; text-align:center; }
  .utente-date { font-size:.62rem; color:rgba(255,255,255,.25); letter-spacing:.1em; flex-shrink:0; text-align:right; }
  .utenti-empty { text-align:center; padding:3rem; font-size:.7rem; color:rgba(255,255,255,.18); letter-spacing:.2em; text-transform:uppercase; }
  .utenti-search { width:100%; background:var(--s2); border:1px solid var(--border2); border-radius:10px; color:var(--white); font-family:'Poppins',sans-serif; font-size:.85rem; padding:.65rem 1rem; outline:none; margin-bottom:1rem; transition:border-color .2s; }
  .utenti-search:focus { border-color:var(--orange); }
  .utenti-search::placeholder { color:rgba(255,255,255,.2); }
  .utente-actions { display:flex; gap:.4rem; flex-wrap:wrap; margin-top:.7rem; }
  .btn-u { font-family:'Poppins',sans-serif; font-size:.58rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; border-radius:8px; padding:.32rem .7rem; cursor:pointer; border:1px solid; transition:background .2s; white-space:nowrap; }
  .btn-u-eye { background:rgba(99,179,237,.08); border-color:rgba(99,179,237,.25); color:var(--blue); }
  .btn-u-eye:hover { background:rgba(99,179,237,.18); }
  .btn-u-pwd { background:rgba(246,224,94,.08); border-color:rgba(246,224,94,.22); color:var(--yellow); }
  .btn-u-pwd:hover { background:rgba(246,224,94,.18); }
  .btn-u-pts { background:rgba(104,211,145,.08); border-color:rgba(104,211,145,.22); color:var(--green); }
  .btn-u-pts:hover { background:rgba(104,211,145,.18); }
  .btn-u-del { background:rgba(252,129,129,.07); border-color:rgba(252,129,129,.2); color:var(--red); }
  .btn-u-del:hover { background:rgba(252,129,129,.18); }
  .utente-pwd-display { font-size:.72rem; color:var(--muted); margin-top:.4rem; font-family:'Courier New',monospace; display:none; background:var(--s2); border:1px solid var(--border2); border-radius:7px; padding:.3rem .7rem; }

  footer { position: relative; z-index: 1; text-align: center; padding: 2rem; border-top: 1px solid var(--border); font-size: .6rem; letter-spacing: .22em; text-transform: uppercase; color: rgba(255,255,255,.15); }
    footer b { color: var(--orange); opacity: .4; font-weight: 400; margin: 0 .5rem; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-links">
    <a href="index.html">← Home</a>
    <a href="PannelloAdmin.html">← Pannello</a>
  </div>
  <button class="btn-exit" onclick="logout()">Esci</button>
</div>

<section class="hero">
  <div class="pill"><span class="pill-dot"></span>Solo admin</div>
  <h1>GESTIONE<br><em>UTENTI PR</em></h1>
</section>

<div class="page">

  <!-- TABS -->
  <div class="page-tabs">
    <button class="page-tab active" id="tab-pr-btn" onclick="switchPageTab('pr')">🎫 Gestione PR</button>
    <button class="page-tab" id="tab-utenti-btn" onclick="switchPageTab('utenti')">👤 Gestione Utenti</button>
  </div>

  <!-- TAB PR -->
  <div id="tab-pr-content">

  <!-- CREA UTENTE -->
  <div class="sec">
    <div class="sec-head"><span>✦ Crea nuovo utente</span></div>
    <div class="form-card">
      <div class="form-row">
        <div class="f"><label>Nome completo *</label><input type="text" id="new-nome" placeholder="Es. Marco Rossi" /></div>
        <div class="f"><label>Username *</label><input type="text" id="new-usr" placeholder="Es. marco.rossi" oninput="this.value=this.value.toLowerCase().replace(/\s/g,'')" /></div>
      </div>
      <div class="f">
        <label>Password *</label>
        <div class="input-wrap">
          <input type="password" id="new-pwd" placeholder="Minimo 6 caratteri" />
          <button class="btn-eye" type="button" onclick="toggleEye('new-pwd',this)" tabindex="-1">👁</button>
        </div>
      </div>
      <div class="form-row">
        <div class="f">
          <label>Ruolo *</label>
          <select id="new-role" onchange="togglePRFields()">
            <option value="pr">PR</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="f" id="owner-field">
          <label>PR di *</label>
          <select id="new-owner">
            <option value="Ale">🟠 Ale</option>
            <option value="Jajo">🔵 Jajo</option>
          </select>
        </div>
      </div>
      <div class="f" id="level-field">
        <label>Livello PR</label>
        <select id="new-level">
          <option value="0">— Livello 0 (nessun pagamento)</option>
          <option value="1">⭐ Livello 1</option>
          <option value="2">⭐⭐ Livello 2</option>
          <option value="3">⭐⭐⭐ Livello 3</option>
        </select>
      </div>
      <button class="btn-create" id="btn-crea" onclick="creaUtente()">➕ &nbsp; Crea utente</button>
      <div class="msg-ok" id="msg-ok"></div>
      <div class="msg-err" id="msg-err"></div>
    </div>
  </div>

  <!-- LISTA PR -->
  <div class="sec">
    <div class="sec-head"><span>✦ Utenti registrati</span></div>
    <div id="users-list"><div class="empty-list">Caricamento…</div></div>
  </div>

  </div><!-- /tab-pr-content -->

  <!-- TAB UTENTI -->
  <div id="tab-utenti-content" style="display:none;">
    <div class="sec">
      <div class="sec-head"><span>✦ Utenti registrati</span></div>
      <input class="utenti-search" id="utenti-search" placeholder="Cerca per nome, username o telefono…" oninput="filterUtenti()" />
      <div class="utenti-grid" id="utenti-astra-list"><div class="utenti-empty">Caricamento…</div></div>
    </div>
  </div>

</div><!-- /page -->

<footer>© 2026 Astra Events <b>✦</b> Gestione PR <b>✦</b> Solo uso interno</footer>

<script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>
<script>
  // ── Auth ─────────────────────────────────────────────────


  /* ── Tab switch ── */
  function switchPageTab(tab) {
    document.getElementById('tab-pr-content').style.display     = tab === 'pr'     ? 'block' : 'none';
    document.getElementById('tab-utenti-content').style.display = tab === 'utenti' ? 'block' : 'none';
    document.getElementById('tab-pr-btn').classList.toggle('active',     tab === 'pr');
    document.getElementById('tab-utenti-btn').classList.toggle('active', tab === 'utenti');
    if (tab === 'utenti' && !utentiLoaded) loadUtenti();
  }

  let utentiLoaded = false;
  let allUtenti = [];



  // ── Firebase ─────────────────────────────────────────────
  if (!firebase.apps.length) {
    firebase.initializeApp({
      apiKey: "AIzaSyDCKDdde5PhjbZOWt2Tu-NR1esbV8LY5Jk",
      authDomain: "astra-events-338dd.firebaseapp.com",
      projectId: "astra-events-338dd",
      storageBucket: "astra-events-338dd.firebasestorage.app",
      messagingSenderId: "166914171655",
      appId: "1:166914171655:web:835d061dde01e5aab89ba2"
    });
  }
  const db = firebase.firestore();

  const AUTH_WORKER = "https://astra-auth.astraaevents.workers.dev";
  async function hashPassword(pwd) {
    const res = await fetch(AUTH_WORKER, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "hash", password: pwd })
    });
    const data = await res.json();
    return data.hash;
  }


  async function verifyAdminOnFirestore() {
    const usr = (sessionStorage.getItem('astra_user') || localStorage.getItem('ls_astra_user'));
    if (!usr) return false;
    try {
      const snap = await db.collection('utenti').doc(usr).get();
      if (!snap.exists) return false;
      return snap.data().role === 'admin';
    } catch(e) { return false; }
  }

  (async () => {
    const role = (sessionStorage.getItem('astra_role') || localStorage.getItem('ls_astra_role'));
    const isAdmin = (sessionStorage.getItem('astra_admin') === '1' || localStorage.getItem('ls_astra_admin') === '1') || role === 'admin';
    if (!isAdmin) { alert('Accesso negato.'); window.location.href = 'index.html'; return; }
    const verified = await verifyAdminOnFirestore();
    if (!verified) { alert('Accesso negato.'); sessionStorage.clear(); window.location.href = 'index.html'; }
  })();


  function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

  // ── Form helpers ─────────────────────────────────────────
  function togglePRFields() {
    const pr = document.getElementById('new-role').value === 'pr';
    document.getElementById('owner-field').style.display = pr ? '' : 'none';
    document.getElementById('level-field').style.display = pr ? '' : 'none';
  }

  function toggleEye(id, btn) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
  }

  document.addEventListener('DOMContentLoaded', togglePRFields);

  // ── Seed Ale & Jajo ───────────────────────────────────────
  ['ale','jajo'].forEach(async id => {
    db.collection('utenti').doc(id).get().then(async d => {
      if (!d.exists) db.collection('utenti').doc(id).set({
        username: id, password: await hashPassword(id + '2025'), role: 'admin', nome: id.charAt(0).toUpperCase() + id.slice(1), createdAt: Date.now()
      });
    }).catch(()=>{});
  });

  // ── Crea utente ───────────────────────────────────────────
  async function creaUtente() {
    const nome  = document.getElementById('new-nome').value.trim();
    const usr   = document.getElementById('new-usr').value.trim().toLowerCase();
    const pwd   = document.getElementById('new-pwd').value;
    const role  = document.getElementById('new-role').value;
    const owner = role === 'pr' ? document.getElementById('new-owner').value : '';
    const level = role === 'pr' ? parseInt(document.getElementById('new-level').value) : null;

    if (!nome) { alert('Inserisci il nome.'); return; }
    if (!usr)  { alert('Inserisci username.'); return; }
    if (pwd.length < 6) { alert('Password min 6 caratteri.'); return; }
    if (!/^[a-z0-9._-]+$/.test(usr)) { alert('Username: solo lettere minuscole, numeri, punto, trattino.'); return; }

    const btn = document.getElementById('btn-crea');
    btn.disabled = true; btn.textContent = 'Creazione…';
    document.getElementById('msg-ok').style.display = 'none';
    document.getElementById('msg-err').style.display = 'none';

    try {
      const ex = await db.collection('utenti').doc(usr).get();
      if (ex.exists) throw new Error('Username già in uso.');
      await db.collection('utenti').doc(usr).set({ username: usr, password: await hashPassword(pwd), role, nome, owner, level, createdAt: Date.now() });
      ['new-nome','new-usr','new-pwd'].forEach(id => document.getElementById(id).value = '');
      const el = document.getElementById('msg-ok');
      el.textContent = '✅ ' + usr + ' creato' + (owner ? ' — PR di ' + owner : '') + '!';
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    } catch(e) {
      const el = document.getElementById('msg-err');
      el.textContent = '❌ ' + e.message;
      el.style.display = 'block';
    }
    btn.disabled = false; btn.innerHTML = '➕ &nbsp; Crea utente';
  }

  // ── Lista utenti ──────────────────────────────────────────
  const LV = {
    bg: ['rgba(104,211,145,.1)','rgba(246,224,94,.1)','rgba(252,129,129,.1)'],
    bd: ['rgba(104,211,145,.3)','rgba(246,224,94,.3)','rgba(252,129,129,.3)'],
    cl: ['#68D391','#F6E05E','#FC8181']
  };

  db.collection('utenti').onSnapshot(snap => {
    const list = document.getElementById('users-list');
    if (snap.empty) { list.innerHTML = '<div class="empty-list">Nessun utente</div>'; return; }

    const docs = snap.docs.slice().sort((a,b) => {
      const ra = a.data().role, rb = b.data().role;
      if (ra !== rb) return ra === 'admin' ? -1 : 1;
      return (a.data().nome||'').localeCompare(b.data().nome||'');
    });

    list.innerHTML = '';
    const me = (sessionStorage.getItem('astra_user') || localStorage.getItem('ls_astra_user'));

    docs.forEach(doc => {
      const u = doc.data();
      const isMe = doc.id === me;
      const isPR = u.role === 'pr';
      const lvIdx = Math.max(0, (u.level != null ? u.level : 1)) === 0 ? -1 : (u.level || 1) - 1;

      const card = document.createElement('div');
      card.className = 'user-card';

      // ── Row 1: avatar + name ──────────────────────────────
      const header = document.createElement('div');
      header.className = 'uc-header';

      const av = document.createElement('div');
      av.className = 'uc-avatar ' + (isPR ? 'is-pr' : 'is-admin');
      av.textContent = isPR ? '🎫' : '⚙';

      const name = document.createElement('div');
      name.className = 'uc-name';
      name.textContent = u.nome || u.username;

      header.appendChild(av);
      header.appendChild(name);

      // ── Row 2: badges ─────────────────────────────────────
      const badges = document.createElement('div');
      badges.className = 'uc-badges';

      const bRole = document.createElement('span');
      bRole.className = 'badge ' + (isPR ? 'badge-pr' : 'badge-admin');
      bRole.textContent = isPR ? '🎫 PR' : '⚙ Admin';
      if (isMe) bRole.textContent += ' (tu)';
      badges.appendChild(bRole);

      if (u.owner) {
        const bOwn = document.createElement('span');
        bOwn.className = 'badge ' + (u.owner === 'Ale' ? 'badge-ale' : 'badge-jajo');
        bOwn.textContent = u.owner === 'Ale' ? '🟠 Ale' : '🔵 Jajo';
        badges.appendChild(bOwn);
      }
      if (isPR && u.level != null) {
        const bLv = document.createElement('span');
        bLv.className = 'badge badge-lv' + u.level;
        bLv.textContent = u.level === 0 ? '— Lv 0' : '⭐'.repeat(u.level) + ' Lv ' + u.level;
        badges.appendChild(bLv);
      }

      // ── Row 3: username ──────────────────────────────────
      const meta = document.createElement('div');
      meta.className = 'uc-meta';
      meta.innerHTML = '<strong>@' + u.username + '</strong>';

      // ── Row 4: actions ───────────────────────────────────
      const actions = document.createElement('div');
      actions.className = 'uc-actions';

      // 🔑 Cambia password
      const btnPwd = document.createElement('button');
      btnPwd.className = 'uc-btn uc-pwd';
      btnPwd.innerHTML = '🔑 Cambia pwd';
      btnPwd.addEventListener('click', async () => {
        const p = prompt('Nuova password per "' + (u.nome||u.username) + '" (min 6):');
        if (!p || p.length < 6) return;
        await db.collection('utenti').doc(doc.id).update({ password: await hashPassword(p) });
      });

      actions.appendChild(btnPwd);

      if (isPR) {
        // Level select
        const selLv = document.createElement('select');
        selLv.className = 'uc-lv-select';
        const _lvIdx = u.level === 0 ? null : Math.max(0, (u.level || 1) - 1);
        selLv.style.cssText = _lvIdx !== null
          ? 'background:' + LV.bg[_lvIdx] + ';border:1px solid ' + LV.bd[_lvIdx] + ';color:' + LV.cl[_lvIdx] + ';'
          : 'background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.35);';
        [['0','— Livello 0'],['1','⭐ Livello 1'],['2','⭐⭐ Livello 2'],['3','⭐⭐⭐ Livello 3']].forEach(([v,t]) => {
          const o = document.createElement('option');
          o.value = v; o.textContent = t;
          if (String(u.level != null ? u.level : 0) === v) o.selected = true;
          selLv.appendChild(o);
        });
        selLv.addEventListener('change', async () => {
          const nLv = parseInt(selLv.value);
          if (nLv === 0) {
            selLv.style.background = 'rgba(255,255,255,.05)';
            selLv.style.borderColor = 'rgba(255,255,255,.15)';
            selLv.style.color = 'rgba(255,255,255,.35)';
          } else {
            const i = nLv - 1;
            selLv.style.background = LV.bg[i];
            selLv.style.borderColor = LV.bd[i];
            selLv.style.color = LV.cl[i];
          }
          await db.collection('utenti').doc(doc.id).update({ level: nLv });
        });
        actions.appendChild(selLv);
      } else {
        actions.appendChild(document.createElement('div'));
      }

      // ✕ Elimina
      const btnDel = document.createElement('button');
      btnDel.className = 'uc-btn uc-del';
      btnDel.innerHTML = '✕ Elimina';
      if (isMe) { btnDel.disabled = true; }
      btnDel.addEventListener('click', async () => {
        if (!confirm('Eliminare "' + (u.nome||u.username) + '"?')) return;
        await db.collection('utenti').doc(doc.id).delete();
      });
      actions.appendChild(btnDel);

      card.appendChild(header);
      card.appendChild(badges);
      card.appendChild(meta);
      card.appendChild(actions);
      list.appendChild(card);
    });
  }, err => {
    document.getElementById('users-list').innerHTML = '<div class="empty-list">Errore: ' + err.message + '</div>';
  });

  function fmtDateTime(ts) {
    if (!ts) return '—';
    return new Date(ts).toLocaleString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function loadUtenti() {
    utentiLoaded = true;
    db.collection('utentiAstra').orderBy('registratoAt', 'desc').onSnapshot(snap => {
      allUtenti = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderUtenti(allUtenti);
    }, () => {
      // Fallback senza orderBy se manca l'indice
      db.collection('utentiAstra').onSnapshot(snap => {
        allUtenti = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.registratoAt||0)-(a.registratoAt||0));
        renderUtenti(allUtenti);
      });
    });
  }

  function filterUtenti() {
    const q = document.getElementById('utenti-search').value.toLowerCase();
    if (!q) { renderUtenti(allUtenti); return; }
    renderUtenti(allUtenti.filter(u =>
      (u.nome||'').toLowerCase().includes(q) ||
      (u.cognome||'').toLowerCase().includes(q) ||
      (u.username||'').toLowerCase().includes(q) ||
      (u.tel||'').includes(q)
    ));
  }

  function renderUtenti(list) {
    const el = document.getElementById('utenti-astra-list');
    if (!list.length) { el.innerHTML = '<div class="utenti-empty">Nessun utente registrato</div>'; return; }
    el.innerHTML = '';
    list.forEach((u, i) => {
      const card = document.createElement('div');
      card.className = 'utente-card';
      card.style.cssText += ';flex-direction:column;align-items:stretch;';
      card.style.animationDelay = i * 0.04 + 's';

      // Top row
      const topRow = document.createElement('div');
      topRow.style.cssText = 'display:flex;align-items:center;gap:1rem;flex-wrap:wrap;';
      topRow.innerHTML = `
        <div class="utente-avatar">👤</div>
        <div class="utente-info">
          <div class="utente-name">${u.nome || ''} ${u.cognome || ''}</div>
          <div class="utente-meta">
            @<span>${u.username || '—'}</span> &nbsp;·&nbsp;
            📱 <span>${u.tel || '—'}</span>
          </div>
        </div>
        <div style="text-align:center;flex-shrink:0;">
          <div class="utente-pts" id="pts-${u.id}">${u.punti || 0}</div>
          <div class="utente-pts-label">punti</div>
        </div>
        <div class="utente-date">🕒 ${fmtDateTime(u.registratoAt)}</div>`;
      card.appendChild(topRow);

      // Password display
      const pwdDisplay = document.createElement('div');
      // Action buttons
      const actions = document.createElement('div');
      actions.className = 'utente-actions';

      // 🔑 Cambia password
      const btnPwd = document.createElement('button');
      btnPwd.className = 'btn-u btn-u-pwd';
      btnPwd.textContent = '🔑 Cambia pwd';
      btnPwd.addEventListener('click', async () => {
        const np = prompt('Nuova password per "' + (u.nome||u.username) + '" (min 6):');
        if (!np || np.length < 6) return;
        await db.collection('utentiAstra').doc(u.id).update({ password: await hashPassword(np) });
        pwdDisplay.textContent = 'Password: aggiornata ✓';
        alert('✓ Password aggiornata.');
      });
      actions.appendChild(btnPwd);

      // ⭐ Gestisci punti
      const btnPts = document.createElement('button');
      btnPts.className = 'btn-u btn-u-pts';
      btnPts.textContent = '⭐ Punti';
      btnPts.addEventListener('click', async () => {
        const input = prompt('Aggiungi o rimuovi punti a ' + (u.nome||u.username) + '. Inserisci un numero (es. +10 o -20 o 50):');
        if (input === null) return;
        const delta = parseInt(input.replace('+','').trim());
        if (isNaN(delta)) { alert('Numero non valido.'); return; }
        const currentPts = (await db.collection('utentiAstra').doc(u.id).get()).data().punti || 0;
        const newPts = Math.max(0, currentPts + delta);
        const entry = { tipo: delta > 0 ? 'bonus' : 'detrazione', desc: 'Modifica manuale admin (' + (delta > 0 ? '+' : '') + delta + ' pts)', punti: delta, ts: Date.now() };
        const storico = (await db.collection('utentiAstra').doc(u.id).get()).data().storico || [];
        storico.push(entry);
        await db.collection('utentiAstra').doc(u.id).update({ punti: newPts, storico });
        const ptsEl = document.getElementById('pts-' + u.id);
        if (ptsEl) ptsEl.textContent = newPts;
        u.punti = newPts;
        alert('✓ Punti aggiornati: ' + newPts + ' pts totali.');
      });
      actions.appendChild(btnPts);

      // ✕ Elimina
      const btnDel = document.createElement('button');
      btnDel.className = 'btn-u btn-u-del';
      btnDel.textContent = '✕ Elimina';
      btnDel.addEventListener('click', async () => {
        if (!confirm('Eliminare definitivamente "' + (u.nome||u.username) + '"?')) return;
        await db.collection('utentiAstra').doc(u.id).delete();
      });
      actions.appendChild(btnDel);

      card.appendChild(actions);
      el.appendChild(card);
    });
  }
</script>
</body>
</html>
